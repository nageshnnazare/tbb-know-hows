// ============= Example 1: Basic Operations =============

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic Operations ===&quot; &lt;&lt; endl;

    concurrent_hash_map&lt;string, int&gt; map;

    // Insert
    map.insert(make_pair(&quot;apple&quot;, 5));
    map.insert(make_pair(&quot;banana&quot;, 3));
    map.insert(make_pair(&quot;cherry&quot;, 7));

    cout &lt;&lt; &quot;Inserted 3 items&quot; &lt;&lt; endl;

    // Find with accessor (read-write)
    {
        concurrent_hash_map&lt;string, int&gt;::accessor a;
        if(map.find(a, &quot;apple&quot;)) {
            cout &lt;&lt; &quot;Found 'apple': &quot; &lt;&lt; a-&gt;second &lt;&lt; endl;
            a-&gt;second = 10;  // Modify while locked
            cout &lt;&lt; &quot;Modified to: &quot; &lt;&lt; a-&gt;second &lt;&lt; endl;
        }
    } // Lock released

    // Find with const_accessor (read-only)
    {
        concurrent_hash_map&lt;string, int&gt;::const_accessor ca;
        if(map.find(ca, &quot;apple&quot;)) {
            cout &lt;&lt; &quot;Read 'apple': &quot; &lt;&lt; ca-&gt;second &lt;&lt; endl;
            // ca-&gt;second = 20;  // ERROR: const accessor
        }
    }

    // Size and erase
    cout &lt;&lt; &quot;Map size: &quot; &lt;&lt; map.size() &lt;&lt; endl;
    map.erase(&quot;banana&quot;);
    cout &lt;&lt; &quot;After erase: &quot; &lt;&lt; map.size() &lt;&lt; endl;
}

// ============= Example 2: Concurrent Insertions =============

void example2_concurrent_insert() {
    cout &lt;&lt; &quot;\\n=== Example 2: Concurrent Insertions ===&quot; &lt;&lt; endl;

    concurrent_hash_map&lt;int, int&gt; map;
    const int NUM_THREADS = 4;
    const int ITEMS_PER_THREAD = 1000;

    auto start = high_resolution_clock::now();

    // Multiple threads inserting
    vector&lt;thread&gt; threads;
    for(int t = 0; t &lt; NUM_THREADS; ++t) {
        threads.emplace_back([&amp;, t]() {
            for(int i = 0; i &lt; ITEMS_PER_THREAD; ++i) {
                int key = t * ITEMS_PER_THREAD + i;
                map.insert(make_pair(key, key * key));
            }
        });
    }

    for(auto&amp; th : threads) th.join();

    auto elapsed = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Inserted &quot; &lt;&lt; map.size() &lt;&lt; &quot; items&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; elapsed &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Expected: &quot; &lt;&lt; NUM_THREADS * ITEMS_PER_THREAD &lt;&lt; endl;
}

struct UserData {
    string name;
    int age;
    double balance;

    UserData() : name(&quot;&quot;), age(0), balance(0.0) {}
    UserData(string n, int a, double b) : name(n), age(a), balance(b) {}
};

void example3_accessor_pattern() {
    cout &lt;&lt; &quot;\\n=== Example 3: Accessor Pattern ===&quot; &lt;&lt; endl;

    concurrent_hash_map&lt;int, UserData&gt; users;

    // Insert users
    users.insert(make_pair(1, UserData(&quot;Alice&quot;, 30, 1000.0)));
    users.insert(make_pair(2, UserData(&quot;Bob&quot;, 25, 1500.0)));
    users.insert(make_pair(3, UserData(&quot;Charlie&quot;, 35, 2000.0)));

    // Update user balance (thread-safe)
    {
        concurrent_hash_map&lt;int, UserData&gt;::accessor a;
        if(users.find(a, 1)) {
            cout &lt;&lt; &quot;User 1 (before): &quot; &lt;&lt; a-&gt;second.name 
                 &lt;&lt; &quot;, balance=&quot; &lt;&lt; a-&gt;second.balance &lt;&lt; endl;
            a-&gt;second.balance += 500.0;  // Thread-safe update
            cout &lt;&lt; &quot;User 1 (after): &quot; &lt;&lt; a-&gt;second.name 
                 &lt;&lt; &quot;, balance=&quot; &lt;&lt; a-&gt;second.balance &lt;&lt; endl;
        }
    } // Automatic lock release

    // Read-only access (allows concurrent reads)
    {
        concurrent_hash_map&lt;int, UserData&gt;::const_accessor ca;
        if(users.find(ca, 1)) {
            cout &lt;&lt; &quot;Read user: &quot; &lt;&lt; ca-&gt;second.name 
                 &lt;&lt; &quot;, balance=&quot; &lt;&lt; ca-&gt;second.balance &lt;&lt; endl;
        }
    }
}

void example4_insert_or_update() {
    cout &lt;&lt; &quot;\\n=== Example 4: Insert or Update ===&quot; &lt;&lt; endl;

    concurrent_hash_map&lt;string, int&gt; word_count;

    vector&lt;string&gt; words = {
        &quot;hello&quot;, &quot;world&quot;, &quot;hello&quot;, &quot;tbb&quot;, &quot;world&quot;, 
        &quot;hello&quot;, &quot;concurrent&quot;, &quot;map&quot;, &quot;tbb&quot;
    };

    // Count words concurrently
    parallel_for(blocked_range&lt;size_t&gt;(0, words.size()),
        [&amp;](blocked_range&lt;size_t&gt; r) {
            for(size_t i = r.begin(); i != r.end(); ++i) {
                concurrent_hash_map&lt;string, int&gt;::accessor a;
                if(word_count.insert(a, words[i])) {
                    // New insertion
                    a-&gt;second = 1;
                } else {
                    // Already exists, increment
                    a-&gt;second++;
                }
            }
        });

    // Print results
    cout &lt;&lt; &quot;Word counts:&quot; &lt;&lt; endl;
    for(auto it = word_count.begin(); it != word_count.end(); ++it) {
        cout &lt;&lt; &quot;  &quot; &lt;&lt; it-&gt;first &lt;&lt; &quot;: &quot; &lt;&lt; it-&gt;second &lt;&lt; endl;
    }
}

class ConcurrentCache {
    concurrent_hash_map&lt;int, string&gt; cache;
    tbb::atomic&lt;int&gt; hits;
    tbb::atomic&lt;int&gt; misses;

public:
    ConcurrentCache() {
        hits = 0;
        misses = 0;
    }

    string get(int key) {
        concurrent_hash_map&lt;int, string&gt;::const_accessor ca;
        if(cache.find(ca, key)) {
            hits++;
            return ca-&gt;second;
        }
        misses++;
        return &quot;&quot;;
    }

    void put(int key, const string&amp; value) {
        concurrent_hash_map&lt;int, string&gt;::accessor a;
        if(cache.insert(a, key)) {
            a-&gt;second = value;
        } else {
            a-&gt;second = value;  // Update existing
        }
    }

    void stats() {
        cout &lt;&lt; &quot;Cache size: &quot; &lt;&lt; cache.size() &lt;&lt; endl;
        cout &lt;&lt; &quot;Hits: &quot; &lt;&lt; hits &lt;&lt; &quot;, Misses: &quot; &lt;&lt; misses &lt;&lt; endl;
        cout &lt;&lt; &quot;Hit rate: &quot; &lt;&lt; (100.0 * hits / (hits + misses)) &lt;&lt; &quot;%&quot; &lt;&lt; endl;
    }
};

void example5_cache() {
    cout &lt;&lt; &quot;\\n=== Example 5: Concurrent Cache ===&quot; &lt;&lt; endl;

    ConcurrentCache cache;

    // Populate cache
    for(int i = 0; i &lt; 100; ++i) {
        cache.put(i, &quot;Value_&quot; + to_string(i));
    }

    // Concurrent access
    parallel_for(blocked_range&lt;int&gt;(0, 1000),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                int key = rand() % 150;  // Some hits, some misses
                string val = cache.get(key);
            }
        });

    cache.stats();
}

        concurrent_hash_map&lt;int, tbb::atomic&lt;int&gt;&gt;::accessor a;
        counters.insert(a, i);

                if(counters.find(a, counter_id)) {
                    a-&gt;second++;

    for(auto it = counters.begin(); it != counters.end(); ++it) {
        cout &lt;&lt; &quot;  Counter &quot; &lt;&lt; it-&gt;first &lt;&lt; &quot;: &quot; &lt;&lt; it-&gt;second &lt;&lt; endl;

<pre><code class="language-cpp">/*
 * TBB CONCURRENT_BOUNDED_QUEUE - Bounded Queue with Blocking
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;tbb/concurrent_queue.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Bounded Queue ===&quot; &lt;&lt; endl;

    concurrent_bounded_queue&lt;int&gt; queue;
    queue.set_capacity(5);

    cout &lt;&lt; &quot;Queue capacity: &quot; &lt;&lt; queue.capacity() &lt;&lt; endl;

    for(int i = 0; i &lt; 5; ++i) {
        queue.push(i);
        cout &lt;&lt; &quot;Pushed: &quot; &lt;&lt; i &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Queue is full (size=&quot; &lt;&lt; queue.size() &lt;&lt; &quot;)&quot; &lt;&lt; endl;

    int item;
    while(queue.try_pop(item)) {
        cout &lt;&lt; &quot;Popped: &quot; &lt;&lt; item &lt;&lt; endl;
    }
}

void example2_blocking() {
    cout &lt;&lt; &quot;\\n=== Example 2: Blocking Operations ===&quot; &lt;&lt; endl;

    concurrent_bounded_queue&lt;int&gt; queue;
    queue.set_capacity(10);

    thread producer([&amp;]() {
        for(int i = 0; i &lt; 20; ++i) {
            queue.push(i);  // Blocks when full
            cout &lt;&lt; &quot;Produced: &quot; &lt;&lt; i &lt;&lt; endl;
            this_thread::sleep_for(milliseconds(10));
        }
    });

    this_thread::sleep_for(milliseconds(50));

    thread consumer([&amp;]() {
        for(int i = 0; i &lt; 20; ++i) {
            int item;
            queue.pop(item);  // Blocks when empty
            cout &lt;&lt; &quot;Consumed: &quot; &lt;&lt; item &lt;&lt; endl;
            this_thread::sleep_for(milliseconds(15));
        }
    });

    producer.join();
    consumer.join();

    cout &lt;&lt; &quot;Blocking queue ensures backpressure!&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TBB MUTEX - Mutual Exclusion Locks
 * 
 * DEFINITION:
 * TBB provides several mutex types for protecting shared data from
 * concurrent access. Each has different characteristics for different use cases.
 * 
 * MUTEX TYPES:
 * - mutex: Fair, scalable, default choice
 * - spin_mutex: Busy-wait, for very short critical sections
 * - queuing_mutex: FIFO ordering, guaranteed fairness
 * - spin_rw_mutex: Reader-writer lock with spinning
 * - queuing_rw_mutex: Reader-writer lock with queuing
 * 
 * WHEN TO USE:
 * - Protect shared mutable state
 * - Critical sections
 * - Coordinate threads
 * - Serialize access to resources
 * 
 * SCOPED_LOCK PATTERN:
 * - RAII-based lock acquisition
 * - Automatic unlock on scope exit
 * - Exception-safe
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;vector&gt;
#include &lt;thread&gt;
#include &lt;chrono&gt;
#include &lt;tbb/mutex.h&gt;
#include &lt;tbb/spin_mutex.h&gt;
#include &lt;tbb/queuing_mutex.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic tbb::mutex =============

void example1_basic_mutex() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic tbb::mutex ===&quot; &lt;&lt; endl;

    tbb::mutex mtx;
    int shared_counter = 0;
    vector&lt;int&gt; shared_log;

    const int N = 1000;

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                tbb::mutex::scoped_lock lock(mtx);
                shared_counter++;
                if(shared_counter % 100 == 0) {
                    shared_log.push_back(shared_counter);
                }
            }
        });

    auto elapsed = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Counter: &quot; &lt;&lt; shared_counter &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; elapsed &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Log entries: &quot; &lt;&lt; shared_log.size() &lt;&lt; endl;
}

// ============= Example 2: Scoped Lock Pattern =============

void example2_scoped_lock() {
    cout &lt;&lt; &quot;\\n=== Example 2: Scoped Lock Pattern ===&quot; &lt;&lt; endl;

    tbb::mutex mtx;
    int balance = 1000;

    auto deposit = [&amp;](int amount) {
        tbb::mutex::scoped_lock lock(mtx);
        balance += amount;
        cout &lt;&lt; &quot;Deposited &quot; &lt;&lt; amount &lt;&lt; &quot;, balance: &quot; &lt;&lt; balance &lt;&lt; endl;
    }; // Lock automatically released

    auto withdraw = [&amp;](int amount) {
        tbb::mutex::scoped_lock lock(mtx);
        if(balance &gt;= amount) {
            balance -= amount;
            cout &lt;&lt; &quot;Withdrew &quot; &lt;&lt; amount &lt;&lt; &quot;, balance: &quot; &lt;&lt; balance &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;Insufficient funds for &quot; &lt;&lt; amount &lt;&lt; endl;
        }
    };

    vector&lt;thread&gt; threads;
    threads.emplace_back([&amp;]() { deposit(500); });
    threads.emplace_back([&amp;]() { withdraw(300); });
    threads.emplace_back([&amp;]() { deposit(200); });
    threads.emplace_back([&amp;]() { withdraw(1000); });

    for(auto&amp; t : threads) t.join();

    cout &lt;&lt; &quot;Final balance: &quot; &lt;&lt; balance &lt;&lt; endl;
}

// ============= Example 3: Multiple Mutexes =============

void example3_multiple_mutexes() {
    cout &lt;&lt; &quot;\\n=== Example 3: Multiple Mutexes ===&quot; &lt;&lt; endl;

    tbb::mutex mtx1, mtx2;
    int counter1 = 0, counter2 = 0;

    parallel_for(blocked_range&lt;int&gt;(0, 1000),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                if(i % 2 == 0) {
                    tbb::mutex::scoped_lock lock(mtx1);
                    counter1++;
                } else {
                    tbb::mutex::scoped_lock lock(mtx2);
                    counter2++;
                }
            }
        });

    cout &lt;&lt; &quot;Counter 1 (even): &quot; &lt;&lt; counter1 &lt;&lt; endl;
    cout &lt;&lt; &quot;Counter 2 (odd):  &quot; &lt;&lt; counter2 &lt;&lt; endl;
    cout &lt;&lt; &quot;Using separate mutexes reduces contention&quot; &lt;&lt; endl;
}

// ============= Example 4: Try-Lock Pattern =============

void example4_try_lock() {
    cout &lt;&lt; &quot;\\n=== Example 4: Try-Lock Pattern ===&quot; &lt;&lt; endl;

    tbb::mutex mtx;
    int resource = 0;
    tbb::atomic&lt;int&gt; failed_attempts;
    failed_attempts = 0;

    parallel_for(blocked_range&lt;int&gt;(0, 100),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                tbb::mutex::scoped_lock lock;
                if(lock.try_acquire(mtx)) {
                    // Got the lock
                    resource++;
                    this_thread::sleep_for(microseconds(100));
                    lock.release();
                } else {
                    // Couldn't get lock
                    failed_attempts++;
                }
            }
        });

    cout &lt;&lt; &quot;Resource value: &quot; &lt;&lt; resource &lt;&lt; endl;
    cout &lt;&lt; &quot;Failed attempts: &quot; &lt;&lt; failed_attempts &lt;&lt; endl;
    cout &lt;&lt; &quot;try_acquire() returns false if lock unavailable&quot; &lt;&lt; endl;
}

// ============= Example 5: Comparison of Mutex Types =============

void example5_mutex_comparison() {
    cout &lt;&lt; &quot;\\n=== Example 5: Mutex Type Comparison ===&quot; &lt;&lt; endl;

    const int N = 100000;

    // tbb::mutex (fair, scalable)
    {
        tbb::mutex mtx;
        int counter = 0;

    // spin_mutex (busy-wait)
    {

        parallel_for(blocked_range&lt;int&gt;(0, N),

    {

struct BankAccount {
    tbb::mutex mtx;
    int balance;
    vector&lt;string&gt; transaction_log;

    bool transfer(int amount, const string&amp; description) {
        tbb::mutex::scoped_lock lock(mtx);

        if(balance &gt;= amount) {
            balance -= amount;
            transaction_log.push_back(description);
            return true;
        }

    }

    int get_balance() {
        tbb::mutex::scoped_lock lock(mtx);
        return balance;
    }

        return transaction_log.size();
    }
};

void example7_deadlock_avoidance() {

    cout &lt;&lt; &quot;Good practice: Always lock in same order&quot; &lt;&lt; endl;

    // Thread 1: locks mtx1 then mtx2
    thread t1([&amp;]() {
        for(int i = 0; i &lt; 100; ++i) {
            tbb::mutex::scoped_lock lock1(mtx1);  // Always first
            tbb::mutex::scoped_lock lock2(mtx2);  // Always second
            resource1++;
            resource2++;
        }
    });

    // Thread 2: also locks mtx1 then mtx2 (same order)
    thread t2([&amp;]() {
        for(int i = 0; i &lt; 100; ++i) {
            tbb::mutex::scoped_lock lock1(mtx1);  // Same order
            tbb::mutex::scoped_lock lock2(mtx2);
            resource1++;
            resource2++;
        }
    });

    t1.join();
    t2.join();

    cout &lt;&lt; &quot;Resource 1: &quot; &lt;&lt; resource1 &lt;&lt; endl;
    cout &lt;&lt; &quot;Resource 2: &quot; &lt;&lt; resource2 &lt;&lt; endl;

}

 * TBB ATOMIC - Lock-Free Atomic Operations
 * 
 * DEFINITION:
 * tbb::atomic provides lock-free atomic operations for basic types,
 * ensuring thread-safe access without explicit locking.
 * 
 * KEY FEATURES:
 * - Lock-free operations
 * - Compare-and-swap (CAS)
 * - Fetch-and-add, fetch-and-store
 * - Memory ordering control
 * - Works with basic types
 * 
 * WHEN TO USE:
 * - Counters and flags
 * - Lock-free algorithms
 * - Performance-critical sync
 * - Minimize contention
 * - Simple shared state
 * 
 * PERFORMANCE:
 * - Much faster than mutexes
 * - No context switching
 * - Cache-line aware
 * - Scales with cores
 */

#include &lt;cmath&gt;
#include &lt;vector&gt;

void example1_counter() {
    cout &lt;&lt; &quot;\\n=== Example 1: Atomic Counter ===&quot; &lt;&lt; endl;

    tbb::atomic&lt;int&gt; counter;
    counter = 0;

    const int N = 10000;

    // Multiple threads incrementing
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                counter++;  // Lock-free atomic increment
            }
        });

    cout &lt;&lt; &quot;Counter value: &quot; &lt;&lt; counter &lt;&lt; endl;
    cout &lt;&lt; &quot;Expected: &quot; &lt;&lt; N &lt;&lt; endl;

}

void example2_performance() {
    cout &lt;&lt; &quot;\\n=== Example 2: Performance vs Mutex ===&quot; &lt;&lt; endl;

    const int N = 1000000;

    // With atomic
    tbb::atomic&lt;int&gt; atomic_counter;
    atomic_counter = 0;

    auto start = high_resolution_clock::now();
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i)
                atomic_counter++;

            for(int i = r.begin(); i != r.end(); ++i) {

    // Try again with wrong old value
    old_val = 100;  // Wrong!
    new_val = 300;
    result = value.compare_and_swap(new_val, old_val);

    if(result == old_val) {
        cout &lt;&lt; &quot;Second CAS succeeded&quot; &lt;&lt; endl;
    } else {
        cout &lt;&lt; &quot;Second CAS failed: expected &quot; &lt;&lt; old_val

void example5_flags() {
    cout &lt;&lt; &quot;\\n=== Example 5: Atomic Flags ===&quot; &lt;&lt; endl;

    tbb::atomic&lt;bool&gt; ready;
    tbb::atomic&lt;bool&gt; done;
    ready = false;
    done = false;

    tbb::atomic&lt;int&gt; result;
    result = 0;

    // Worker thread
    thread worker([&amp;]() {
        // Wait for ready signal
        while(!ready) {
            this_thread::yield();
        }

        cout &lt;&lt; &quot;Worker: Processing...&quot; &lt;&lt; endl;

        // Do work
        for(int i = 0; i &lt; 1000; ++i) {
            result += i;
        }

        done = true;
    });

    // Main thread
    this_thread::sleep_for(milliseconds(10));
    cout &lt;&lt; &quot;Main: Signaling worker to start&quot; &lt;&lt; endl;
    ready = true;

    // Wait for completion
    while(!done) {
        this_thread::yield();
    }

    cout &lt;&lt; &quot;Result: &quot; &lt;&lt; result &lt;&lt; endl;
    worker.join();
}

// ============= Example 6: Lock-Free Stack (Simplified) =============

template&lt;typename T&gt;
class LockFreeStack {
    struct Node {
        T value;
        Node* next;
        Node(T v) : value(v), next(nullptr) {}
    };

    tbb::atomic&lt;Node*&gt; head;

public:
    LockFreeStack() {
        head = nullptr;
    }

    void push(T value) {
        Node* new_node = new Node(value);
        Node* old_head;

        do {
            old_head = head;
            new_node-&gt;next = old_head;
        } while(head.compare_and_swap(new_node, old_head) != old_head);
    }

    bool try_pop(T&amp; value) {
        Node* old_head;
        Node* new_head;

        do {
            old_head = head;
            if(old_head == nullptr)
                return false;
            new_head = old_head-&gt;next;
        } while(head.compare_and_swap(new_head, old_head) != old_head);

        value = old_head-&gt;value;
        delete old_head;
        return true;
    }
};

void example6_lock_free_stack() {
    cout &lt;&lt; &quot;\\n=== Example 6: Lock-Free Stack ===&quot; &lt;&lt; endl;

    LockFreeStack&lt;int&gt; stack;

    // Push items
    for(int i = 0; i &lt; 10; ++i) {
        stack.push(i);
    }

    cout &lt;&lt; &quot;Pushed 10 items&quot; &lt;&lt; endl;

    // Pop items
    cout &lt;&lt; &quot;Popping: &quot;;
    int value;
    while(stack.try_pop(value)) {
        cout &lt;&lt; value &lt;&lt; &quot; &quot;;
    }
    cout &lt;&lt; endl;
    cout &lt;&lt; &quot;Lock-free data structure using atomic CAS!&quot; &lt;&lt; endl;
}

// ============= Example 7: Parallel Accumulation =============

void example7_accumulation() {
    cout &lt;&lt; &quot;\\n=== Example 7: Parallel Accumulation ===&quot; &lt;&lt; endl;

    const int N = 1000000;
    vector&lt;int&gt; data(N);
    for(int i = 0; i &lt; N; ++i) data[i] = i % 100;

    tbb::atomic&lt;long long&gt; sum;
    sum = 0;

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            long long local_sum = 0;
            for(int i = r.begin(); i != r.end(); ++i) {
                local_sum += data[i];
            }
            // Atomic add of local sum
            sum.fetch_and_add(local_sum);
        });

    auto elapsed = duration_cast&lt;microseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Sum: &quot; &lt;&lt; sum &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; elapsed &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Using atomic for final accumulation&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TBB READER-WRITER LOCKS - Multiple Readers, Single Writer
 * 
 * DEFINITION:
 * Reader-writer locks allow multiple threads to read concurrently,
 * but only one thread to write at a time. Readers and writers are mutually exclusive.
 * 
 * TBB PROVIDES:
 * - spin_rw_mutex: Spinlock-based RW lock
 * - queuing_rw_mutex: Fair queuing RW lock
 * - speculative_spin_rw_mutex: Hardware transactional memory
 * 
 * LOCK MODES:
 * - Read lock (false): Multiple threads can hold simultaneously
 * - Write lock (true): Exclusive access
 * 
 * WHEN TO USE:
 * - Read-heavy workloads
 * - Shared configuration data
 * - Caches with occasional updates
 * - Symbol tables
 * - Lookup tables
 * 
 * BENEFITS:
 * + Multiple concurrent readers
 * + Better than regular mutex for read-heavy loads
 * + Automatic reader/writer coordination
 */

#include &lt;iostream&gt;
#include &lt;map&gt;
#include &lt;algorithm&gt;
#include &lt;cmath&gt;
#include &lt;vector&gt;
#include &lt;string&gt;
#include &lt;thread&gt;
#include &lt;chrono&gt;
#include &lt;tbb/spin_rw_mutex.h&gt;
#include &lt;tbb/queuing_rw_mutex.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;

using namespace std;
using std::atomic;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic Reader-Writer Pattern =============

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic Reader-Writer Lock ===&quot; &lt;&lt; endl;

    spin_rw_mutex rw_mtx;
    int shared_data = 100;

    // Reader 1
    {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);  // false = read
        cout &lt;&lt; &quot;Reader 1: &quot; &lt;&lt; shared_data &lt;&lt; endl;
    }

    // Reader 2 (can run concurrently with Reader 1)
    {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);  // read
        cout &lt;&lt; &quot;Reader 2: &quot; &lt;&lt; shared_data &lt;&lt; endl;
    }

    // Writer (exclusive access)
    {
        spin_rw_mutex::scoped_lock write_lock(rw_mtx, true);  // true = write
        shared_data = 200;
        cout &lt;&lt; &quot;Writer: Updated to &quot; &lt;&lt; shared_data &lt;&lt; endl;
    }

    // Reader 3 (sees updated value)
    {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
        cout &lt;&lt; &quot;Reader 3: &quot; &lt;&lt; shared_data &lt;&lt; endl;
    }
}

// ============= Example 2: Concurrent Reads =============

void example2_concurrent_reads() {
    cout &lt;&lt; &quot;\\n=== Example 2: Concurrent Reads ===&quot; &lt;&lt; endl;

    spin_rw_mutex rw_mtx;
    vector&lt;int&gt; shared_config = {1, 2, 3, 4, 5};
    tbb::atomic&lt;int&gt; reader_count;
    reader_count = 0;

    auto start = high_resolution_clock::now();

    // Many concurrent readers
    parallel_for(blocked_range&lt;int&gt;(0, 1000),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
                // Multiple readers can hold lock simultaneously
                int sum = 0;
                for(int val : shared_config) {
                    sum += val;
                }
                reader_count++;
            }
        });

    auto elapsed = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Completed &quot; &lt;&lt; reader_count &lt;&lt; &quot; reads in &quot; &lt;&lt; elapsed &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Multiple readers executed concurrently!&quot; &lt;&lt; endl;
}

// ============= Example 3: Mixed Reads and Writes =============

void example3_mixed() {
    cout &lt;&lt; &quot;\\n=== Example 3: Mixed Reads and Writes ===&quot; &lt;&lt; endl;

    spin_rw_mutex rw_mtx;
    int shared_counter = 0;
    tbb::atomic&lt;int&gt; reads, writes;
    reads = 0;
    writes = 0;

    const int N = 1000;

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                if(i % 10 == 0) {
                    // Write (10% of operations)
                    spin_rw_mutex::scoped_lock write_lock(rw_mtx, true);
                    shared_counter++;
                    writes++;
                } else {
                    // Read (90% of operations)
                    spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
                    int val = shared_counter;  // Read
                    reads++;
                }
            }
        });

    auto elapsed = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Reads: &quot; &lt;&lt; reads &lt;&lt; &quot; (&quot; &lt;&lt; reads*100/N &lt;&lt; &quot;%)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Writes: &quot; &lt;&lt; writes &lt;&lt; &quot; (&quot; &lt;&lt; writes*100/N &lt;&lt; &quot;%)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; elapsed &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;RW lock is efficient for read-heavy workloads&quot; &lt;&lt; endl;
}

// ============= Example 4: Configuration Manager =============

class ConfigManager {
    spin_rw_mutex rw_mtx;
    map&lt;string, string&gt; config;

public:
    ConfigManager() {
        config[&quot;host&quot;] = &quot;localhost&quot;;
        config[&quot;port&quot;] = &quot;8080&quot;;
        config[&quot;timeout&quot;] = &quot;30&quot;;
    }

    string get(const string&amp; key) {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
        auto it = config.find(key);
        return (it != config.end()) ? it-&gt;second : &quot;&quot;;
    }

    void set(const string&amp; key, const string&amp; value) {
        spin_rw_mutex::scoped_lock write_lock(rw_mtx, true);
        config[key] = value;
    }

    int size() {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
        return config.size();
    }
};

void example4_config_manager() {
    cout &lt;&lt; &quot;\\n=== Example 4: Configuration Manager ===&quot; &lt;&lt; endl;

    ConfigManager cfg;

    // Many threads reading config
    tbb::atomic&lt;int&gt; read_count;
    read_count = 0;

    thread readers([&amp;]() {
        parallel_for(blocked_range&lt;int&gt;(0, 1000),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    string host = cfg.get(&quot;host&quot;);
                    string port = cfg.get(&quot;port&quot;);

    cout &lt;&lt; &quot;Readers don't block each other!&quot; &lt;&lt; endl;

void example5_performance() {
    cout &lt;&lt; &quot;\\n=== Example 5: RW Lock vs Regular Mutex ===&quot; &lt;&lt; endl;

    const int N = 10000;
    vector&lt;int&gt; data = {1, 2, 3, 4, 5};

    // With regular mutex
    tbb::mutex regular_mtx;
    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                tbb::mutex::scoped_lock lock(regular_mtx);
                int sum = 0;
                for(int x : data) sum += x;
            }
        });

    auto mutex_time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    // With RW lock
    spin_rw_mutex rw_mtx;
    start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
                int sum = 0;
                for(int x : data) sum += x;
            }
        });

    auto rw_time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;RW lock:       &quot; &lt;&lt; rw_time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Speedup:       &quot; &lt;&lt; (double)mutex_time / rw_time &lt;&lt; &quot;x&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;RW lock allows concurrent reads!&quot; &lt;&lt; endl;
}

class ThreadSafeCache {
    queuing_rw_mutex rw_mtx;  // Fair RW lock
    map&lt;int, string&gt; cache;
    tbb::atomic&lt;int&gt; hits, misses, updates;

public:
    ThreadSafeCache() {
        hits = 0;
        misses = 0;
        updates = 0;
    }

    string get(int key) {
        queuing_rw_mutex::scoped_lock read_lock(rw_mtx, false);
        auto it = cache.find(key);
        if(it != cache.end()) {
            hits++;
            return it-&gt;second;
        }
        misses++;
        return &quot;&quot;;
    }

    void put(int key, const string&amp; value) {
        queuing_rw_mutex::scoped_lock write_lock(rw_mtx, true);
        cache[key] = value;
        updates++;
    }

    void stats() {
        cout &lt;&lt; &quot;  Cache size: &quot; &lt;&lt; cache.size() &lt;&lt; endl;
        cout &lt;&lt; &quot;  Hits: &quot; &lt;&lt; hits &lt;&lt; &quot;, Misses: &quot; &lt;&lt; misses &lt;&lt; endl;
        cout &lt;&lt; &quot;  Updates: &quot; &lt;&lt; updates &lt;&lt; endl;
        cout &lt;&lt; &quot;  Hit rate: &quot; &lt;&lt; (100.0 * hits / (hits + misses + 1)) &lt;&lt; &quot;%&quot; &lt;&lt; endl;
    }
};

void example7_upgrade_pattern() {

    // Initialize
    for(int i = 0; i &lt; 100; ++i) {
        data[i] = i;
    }

    cout &lt;&lt; &quot;Pattern: Read first, upgrade to write if needed&quot; &lt;&lt; endl;

    int key = 50;

    // Try read first
    {
        spin_rw_mutex::scoped_lock read_lock(rw_mtx, false);
        cout &lt;&lt; &quot;Checking if key &quot; &lt;&lt; key &lt;&lt; &quot; exists...&quot; &lt;&lt; endl;

        if(data.find(key) == data.end()) {
            // Need to insert - must upgrade to write
            read_lock.release();  // Release read lock

            spin_rw_mutex::scoped_lock write_lock(rw_mtx, true);
            // Check again (may have changed)
            if(data.find(key) == data.end()) {
                data[key] = key * 10;
                cout &lt;&lt; &quot;Inserted new value: &quot; &lt;&lt; data[key] &lt;&lt; endl;
            }
        } else {
            cout &lt;&lt; &quot;Key exists: &quot; &lt;&lt; data[key] &lt;&lt; endl;
        }
    }

    cout &lt;&lt; &quot;Note: Manual upgrade pattern required&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TBB QUEUING_MUTEX - Fair FIFO Mutex
 * 
 * DEFINITION:
 * queuing_mutex is a mutex that grants lock requests in FIFO order,
 * providing guaranteed fairness at the cost of slightly higher overhead.
 * 
 * KEY FEATURES:
 * - FIFO ordering (first to request, first to acquire)
 * - No thread starvation
 * - Predictable latency
 * - Fair scheduling
 * 
 * COMPARISON:
 * - mutex: Fair but not strictly FIFO
 * - spin_mutex: Not fair, can cause starvation
 * - queuing_mutex: Strictly FIFO, guaranteed fairness
 * 
 * WHEN TO USE:
 * - Fairness is critical
 * - Prevent thread starvation
 * - Predictable response times needed
 * - Load balancing across threads
 *

void example1_basic() {

    queuing_mutex mtx;

        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                queuing_mutex::scoped_lock lock(mtx);
                shared_counter++;
            }
        });

    for(auto&amp; counter : thread_access_count) {

    parallel_for(blocked_range&lt;int&gt;(0, 8),
        [&amp;](blocked_range&lt;int&gt; r) {

            for(int i = 0; i &lt; ITERATIONS; ++i) {

// ============= Example 4: Response Time Predictability =============

void example4_predictability() {
    cout &lt;&lt; &quot;\\n=== Example 4: Response Time Predictability ===&quot; &lt;&lt; endl;

    queuing_mutex mtx;
    vector&lt;long long&gt; latencies;
    tbb::spin_mutex latencies_mtx;

    const int N = 100;

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                auto request_time = high_resolution_clock::now();

                queuing_mutex::scoped_lock lock(mtx);

                auto acquired_time = high_resolution_clock::now();
                auto latency = duration_cast&lt;microseconds&gt;(
                    acquired_time - request_time).count();

                // Record latency
                {
                    tbb::spin_mutex::scoped_lock l(latencies_mtx);
                    latencies.push_back(latency);
                }

                // Simulate work
                this_thread::sleep_for(microseconds(100));
            }
        });

    // Calculate statistics
    long long sum = 0, min_lat = LLONG_MAX, max_lat = 0;
    for(auto lat : latencies) {
        sum += lat;
        min_lat = min(min_lat, lat);
        max_lat = max(max_lat, lat);
    }

    cout &lt;&lt; &quot;Latencies (time to acquire lock):&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;  Average: &quot; &lt;&lt; (sum / latencies.size()) &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;  Min: &quot; &lt;&lt; min_lat &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;  Max: &quot; &lt;&lt; max_lat &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;FIFO ensures predictable wait times&quot; &lt;&lt; endl;
}

class TicketSystem {
    queuing_mutex mtx;  // Fair ordering
    int available_tickets;
    vector&lt;string&gt; bookings;

public:
    TicketSystem(int tickets) : available_tickets(tickets) {}

    bool book_ticket(const string&amp; customer) {
        queuing_mutex::scoped_lock lock(mtx);

        if(available_tickets &gt; 0) {
            available_tickets--;
            bookings.push_back(customer);
            return true;
        }
        return false;
    }

    void report() {
        queuing_mutex::scoped_lock lock(mtx);
        cout &lt;&lt; &quot;Total bookings: &quot; &lt;&lt; bookings.size() &lt;&lt; endl;
        cout &lt;&lt; &quot;Remaining tickets: &quot; &lt;&lt; available_tickets &lt;&lt; endl;
    }
};

    // Many customers trying to book concurrently

            for(int i = r.begin(); i != r.end(); ++i) {

    cout &lt;&lt; &quot;FIFO ensures fair first-come-first-served&quot; &lt;&lt; endl;
}

void example7_producer_consumer() {
    cout &lt;&lt; &quot;\\n=== Example 7: Fair Producer-Consumer ===&quot; &lt;&lt; endl;

    queuing_mutex mtx;
    vector&lt;int&gt; buffer;
    const int MAX_BUFFER = 10;
    bool done = false;

    // Multiple producers
    vector&lt;thread&gt; producers;
    for(int p = 0; p &lt; 3; ++p) {
        producers.emplace_back([&amp;, p]() {
            for(int i = 0; i &lt; 10; ++i) {
                queuing_mutex::scoped_lock lock(mtx);
                if(buffer.size() &lt; MAX_BUFFER) {
                    buffer.push_back(p * 100 + i);
                    cout &lt;&lt; &quot;Producer &quot; &lt;&lt; p &lt;&lt; &quot; added: &quot; &lt;&lt; (p * 100 + i) &lt;&lt; endl;
                }
            }
        });
    }

    // Wait for producers
    for(auto&amp; t : producers) t.join();

    {
        queuing_mutex::scoped_lock lock(mtx);
        done = true;
        cout &lt;&lt; &quot;Final buffer size: &quot; &lt;&lt; buffer.size() &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Fair access ensured across all producers&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TBB SCALABLE_ALLOCATOR - High-Performance Memory Allocator
 * 
 * DEFINITION:
 * scalable_allocator is TBB's thread-scalable memory allocator that
 * provides better performance than standard allocators in multi-threaded scenarios.
 * 
 * KEY FEATURES:
 * - Thread-local pools (reduces contention)
 * - Lock-free operations
 * - Scalable with thread count

 * BENEFITS:

 * + Optimized for parallel workloads
 * + Drop-in replacement for std::allocator
 *

 * - Frequent allocations in parallel code
 * - STL containers used by multiple threads
 * - Performance-critical applications
 * - Avoiding allocator bottlenecks
 */

    // Allocate many objects in parallel

        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {

<pre><code class="language-cpp">/*
 * TBB CACHE_ALIGNED_ALLOCATOR - Prevent False Sharing
 * 
 * DEFINITION:
 * cache_aligned_allocator allocates memory aligned to cache line boundaries,
 * preventing false sharing between threads.
 * 
 * FALSE SHARING:
 * When two threads access different variables on the same cache line,
 * they invalidate each other's cache, causing severe performance degradation.
 * 
 * CACHE LINE:
 * - Typical size: 64 bytes
 * - Unit of cache coherency
 * - Shared between CPU cores
 * 
 * KEY FEATURES:
 * - Allocates on cache line boundaries
 * - Prevents false sharing
 * - Combines with scalable_allocator benefits
 * - STL-compatible
 * 
 * WHEN TO USE:
 * - Thread-local data structures
 * - Per-thread counters/accumulators
 * - Arrays accessed by multiple threads
 * - Performance-critical parallel code
 * 
 * BENEFITS:
 * + Eliminates false sharing
 * + Dramatic performance improvement
 * + Better cache utilization
 * - Wastes some memory for padding
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;atomic&gt;
#include &lt;tbb/cache_aligned_allocator.h&gt;
#include &lt;tbb/scalable_allocator.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;

using namespace std;
using std::atomic;
using namespace tbb;
using namespace chrono;

// ============= Example 1: False Sharing Problem =============

struct CounterUnaligned {
    std::atomic&lt;long long&gt; value;
    CounterUnaligned() : value(0) {}
};

struct CounterAligned {
    alignas(64) std::atomic&lt;long long&gt; value;  // Cache line aligned
    CounterAligned() : value(0) {}
};

void example1_false_sharing() {
    cout &lt;&lt; &quot;\\n=== Example 1: False Sharing Problem ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    const int THREADS = 4;

    // Without alignment (false sharing)
    {
        vector&lt;CounterUnaligned&gt; counters(THREADS);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int thread_id = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    counters[thread_id].value++;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;Without alignment: &quot; &lt;&lt; time &lt;&lt; &quot; ms (false sharing)&quot; &lt;&lt; endl;
    }

    // With alignment (no false sharing)
    {
        vector&lt;CounterAligned&gt; counters(THREADS);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int thread_id = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    counters[thread_id].value++;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;With alignment:    &quot; &lt;&lt; time &lt;&lt; &quot; ms (no false sharing)&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Alignment prevents cache line contention!&quot; &lt;&lt; endl;
}

    cout &lt;&lt; &quot;\\n=== Example 2: cache_aligned_allocator Usage ===&quot; &lt;&lt; endl;

    vec.push_back(100);

struct ThreadData {

    cout &lt;&lt; &quot;\\n=== Example 3: Per-Thread Data ===&quot; &lt;&lt; endl;

    const int N = 1000000;
    const int THREADS = 8;

    // Without cache alignment
    {
        vector&lt;ThreadData&gt; data(THREADS);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int tid = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    data[tid].counter++;
                    data[tid].sum += i;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;Without alignment: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    // With cache alignment
    {
        vector&lt;ThreadData, cache_aligned_allocator&lt;ThreadData&gt;&gt; data(THREADS);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int tid = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    data[tid].counter++;
                    data[tid].sum += i;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;With alignment:    &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;

}

void example4_accumulator_array() {
    cout &lt;&lt; &quot;\\n=== Example 4: Accumulator Array ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    const int THREADS = 4;

    // Cache-aligned accumulators
    vector&lt;std::atomic&lt;long long&gt;, cache_aligned_allocator&lt;std::atomic&lt;long long&gt;&gt;&gt; accumulators(THREADS);
    for(auto&amp; acc : accumulators) {
        acc = 0;
    }

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            int tid = task_arena::current_thread_index() % THREADS;
            for(int i = r.begin(); i != r.end(); ++i) {
                accumulators[tid] += i;
            }
        });

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    long long total = 0;
    for(const auto&amp; acc : accumulators) {
        total += acc;
    }

    cout &lt;&lt; &quot;Total: &quot; &lt;&lt; total &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;No false sharing between accumulators&quot; &lt;&lt; endl;
}

// ============= Example 5: Matrix Row Processing =============

void example5_matrix_rows() {
    cout &lt;&lt; &quot;\\n=== Example 5: Matrix Row Processing ===&quot; &lt;&lt; endl;

    const int ROWS = 100;
    const int COLS = 10000;

    // Row sums (cache-aligned to prevent false sharing)
    vector&lt;double, cache_aligned_allocator&lt;double&gt;&gt; row_sums(ROWS, 0.0);

    // Matrix (normal allocation)
    vector&lt;vector&lt;double&gt;&gt; matrix(ROWS, vector&lt;double&gt;(COLS, 1.0));

    auto start = high_resolution_clock::now();

    // Process rows in parallel
    parallel_for(blocked_range&lt;int&gt;(0, ROWS),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int row = r.begin(); row != r.end(); ++row) {
                double sum = 0.0;
                for(int col = 0; col &lt; COLS; ++col) {
                    sum += matrix[row][col];
                }
                row_sums[row] = sum;
            }
        });

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Processed &quot; &lt;&lt; ROWS &lt;&lt; &quot; rows in &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;First row sum: &quot; &lt;&lt; row_sums[0] &lt;&lt; endl;
    cout &lt;&lt; &quot;Each row sum in separate cache line&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TBB ENUMERABLE_THREAD_SPECIFIC - Thread-Local Storage
 * 
 * DEFINITION:
 * enumerable_thread_specific (ETS) provides thread-local storage where
 * each thread gets its own copy of data, eliminating synchronization.
 * 
 * KEY FEATURES:
 * - Thread-local data (no locking needed)
 * - Enumerable (can iterate over all copies)
 * - Automatic initialization per thread
 * - Combining support
 * - Cache-line padding
 * 
 * WHEN TO USE:
 * - Thread-local accumulation
 * - Eliminate contention
 * - Per-thread buffers
 * - Histograms and counting
 * - Reduce synchronization
 * 
 * BENEFITS:
 * + Zero synchronization overhead
 * + Perfect scalability
 * + Cache-friendly
 * + Easy to combine results
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;vector&gt;
#include &lt;string&gt;
#include &lt;chrono&gt;
#include &lt;tbb/enumerable_thread_specific.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic Thread-Local Accumulation =============

void example1_accumulation() {
    cout &lt;&lt; &quot;\\n=== Example 1: Thread-Local Accumulation ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N, 1);

    // Each thread gets its own sum
    enumerable_thread_specific&lt;int&gt; thread_local_sum(0);

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            int&amp; my_sum = thread_local_sum.local();  // Get thread-local copy
            for(int i = r.begin(); i != r.end(); ++i) {
                my_sum += data[i];  // No synchronization needed!
            }
        });

    // Combine all thread-local sums
    int total = 0;
    for(auto&amp; local_sum : thread_local_sum) {
        total += local_sum;
    }

    auto elapsed = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Total sum: &quot; &lt;&lt; total &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; elapsed &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Number of threads: &quot; &lt;&lt; distance(thread_local_sum.begin(), 
                                              thread_local_sum.end()) &lt;&lt; endl;
}

// ============= Example 2: Performance vs Atomic =============

void example2_performance() {
    cout &lt;&lt; &quot;\\n=== Example 2: Performance vs Atomic ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N, 1);

    // With atomic (synchronization overhead)
    tbb::atomic&lt;long long&gt; atomic_sum;
    atomic_sum = 0;

    auto start = high_resolution_clock::now();
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                atomic_sum += data[i];  // Atomic operation
            }
        });
    auto atomic_time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    // With ETS (no synchronization)
    enumerable_thread_specific&lt;long long&gt; ets_sum(0);

    start = high_resolution_clock::now();
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            long long&amp; my_sum = ets_sum.local();
            for(int i = r.begin(); i != r.end(); ++i) {
                my_sum += data[i];  // No synchronization!
            }
        });

    long long total = 0;
    for(auto&amp; s : ets_sum) total += s;

    auto ets_time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Atomic:   &quot; &lt;&lt; atomic_time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;ETS:      &quot; &lt;&lt; ets_time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Speedup:  &quot; &lt;&lt; (double)atomic_time / ets_time &lt;&lt; &quot;x&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Both results: &quot; &lt;&lt; atomic_sum &lt;&lt; &quot; vs &quot; &lt;&lt; total &lt;&lt; endl;
}

        [&amp;](blocked_range&lt;int&gt; r) {

            for(int i = r.begin(); i != r.end(); ++i) {
                int bin = data[i] / 10;  // 0-9
                my_hist[bin]++;

    vector&lt;int&gt; final_histogram(BINS, 0);
    for(auto&amp; hist : thread_histograms) {

<pre><code class="language-cpp">/*
 * TBB PARTITIONERS - Control Work Distribution
 * 
 * DEFINITION:
 * Partitioners control how iteration spaces are divided among threads.
 * They balance between load balancing and cache efficiency.
 * 
 * PARTITIONER TYPES:
 * 1. auto_partitioner (default):
 *    - Automatic load balancing
 *    - Dynamic work stealing
 *    - Best general-purpose choice
 * 
 * 2. simple_partitioner:
 *    - Divides range into equal chunks
 *    - One chunk per thread
 *    - No work stealing
 *    - Best for uniform workloads
 * 
 * 3. static_partitioner:
 *    - Deterministic partitioning
 *    - Cache-friendly
 *    - Reproducible results
 * 
 * 4. affinity_partitioner:
 *    - Cache affinity optimization
 *    - Reuses thread-to-range mapping
 *    - Best for repeated parallel loops
 * 
 * WHEN TO USE EACH:
 * - auto_partitioner: Default, unknown workload
 * - simple_partitioner: Uniform work, minimize overhead
 * - static_partitioner: Need deterministic behavior
 * - affinity_partitioner: Repeated loops on same data
 */

#include &lt;iostream&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;cmath&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;
#include &lt;tbb/partitioner.h&gt;
#include &lt;tbb/spin_mutex.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: auto_partitioner (Default) =============

void example1_auto_partitioner() {
    cout &lt;&lt; &quot;\\n=== Example 1: auto_partitioner (Default) ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;double&gt; data(N, 1.0);
    double sum = 0.0;
    tbb::spin_mutex mtx;

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            double local_sum = 0.0;
            for(int i = r.begin(); i != r.end(); ++i) {
                local_sum += data[i];
            }
            tbb::spin_mutex::scoped_lock lock(mtx);
            sum += local_sum;
        },
        auto_partitioner());  // Automatic load balancing

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Sum: &quot; &lt;&lt; sum &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;auto_partitioner: Dynamic work stealing, good default&quot; &lt;&lt; endl;
}

// ============= Example 2: simple_partitioner =============

void example2_simple_partitioner() {
    cout &lt;&lt; &quot;\\n=== Example 2: simple_partitioner ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N);

    auto start = high_resolution_clock::now();

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                data[i] = i * 2;
            }
        },
        simple_partitioner());  // Equal chunks, no stealing

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Processed &quot; &lt;&lt; N &lt;&lt; &quot; elements&quot; &lt;&lt; endl;

// ============= Example 3: static_partitioner =============

void example3_static_partitioner() {
    cout &lt;&lt; &quot;\\n=== Example 3: static_partitioner ===&quot; &lt;&lt; endl;

    const int N = 1000000;
    vector&lt;int&gt; data(N);

    cout &lt;&lt; &quot;Running same loop twice with static_partitioner:&quot; &lt;&lt; endl;

    // First run
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                data[i] = i % 256;
            }
        },
        static_partitioner());

    int checksum1 = 0;
    for(int i = 0; i &lt; 100; ++i) checksum1 += data[i];

    // Second run
    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                data[i] = i % 256;
            }
        },

    int checksum2 = 0;
    for(int i = 0; i &lt; 100; ++i) checksum2 += data[i];

    cout &lt;&lt; &quot;Checksum 1: &quot; &lt;&lt; checksum1 &lt;&lt; endl;

}

void example4_affinity_partitioner() {

// ============= Example 6: Non-Uniform Workload =============

void example6_nonuniform() {
    cout &lt;&lt; &quot;\\n=== Example 6: Non-Uniform Workload ===&quot; &lt;&lt; endl;

    const int N = 100000;
    vector&lt;double&gt; results(N);

    // Non-uniform: more work for higher indices
    auto nonuniform_work = [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i) {
            double sum = 0.0;
            // Variable work: i iterations
            for(int j = 0; j &lt; i % 1000; ++j) {

            results[i] = sum;

        auto time = duration_cast&lt;milliseconds&gt;(

        cout &lt;&lt; &quot;  auto_partitioner:   &quot; &lt;&lt; time &lt;&lt; &quot; ms (adapts to imbalance)&quot; &lt;&lt; endl;
    }

    // simple_partitioner (poor for imbalanced work)
    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N), nonuniform_work, simple_partitioner());
        auto time = duration_cast&lt;milliseconds&gt;(

        cout &lt;&lt; &quot;  simple_partitioner: &quot; &lt;&lt; time &lt;&lt; &quot; ms (may have imbalance)&quot; &lt;&lt; endl;

}

<pre><code class="language-cpp">/*
 * TBB BLOCKED_RANGE - Iteration Space Concepts
 * 
 * DEFINITION:
 * blocked_range represents a one-dimensional iteration space that can be
 * recursively subdivided for parallel execution.
 * 
 * KEY CONCEPTS:
 * - begin(): First index in range
 * - end(): One past last index
 * - size(): Number of elements
 * - grain_size: Minimum subdivision size
 * - is_divisible(): Can range be split?
 * - empty(): Is range empty?
 * 
 * RANGE TYPES:
 * - blocked_range&lt;T&gt;: 1D range [begin, end)
 * - blocked_range2d&lt;T&gt;: 2D range (rows × cols)
 * - blocked_range3d&lt;T&gt;: 3D range (pages × rows × cols)
 * - Custom ranges: Implement Range concept
 * 
 * GRAIN SIZE:
 * Controls when subdivision stops. Trade-off:
 * - Too small: High overhead from too many tasks
 * - Too large: Poor load balancing
 * - Typical: 1000-10000 iterations
 * 
 * WHEN TO USE:
 * - Standard iteration patterns
 * - Index-based loops
 * - Multi-dimensional arrays
 * - Custom iteration spaces
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/parallel_reduce.h&gt;
#include &lt;tbb/blocked_range.h&gt;
#include &lt;tbb/blocked_range2d.h&gt;
#include &lt;tbb/blocked_range3d.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic blocked_range =============

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic blocked_range ===&quot; &lt;&lt; endl;

    blocked_range&lt;int&gt; range(0, 100, 10);  // [0, 100) with grain 10

    cout &lt;&lt; &quot;Range [&quot; &lt;&lt; range.begin() &lt;&lt; &quot;, &quot; &lt;&lt; range.end() &lt;&lt; &quot;)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Size: &quot; &lt;&lt; range.size() &lt;&lt; endl;
    cout &lt;&lt; &quot;Grain size: &quot; &lt;&lt; range.grainsize() &lt;&lt; endl;
    cout &lt;&lt; &quot;Is divisible: &quot; &lt;&lt; (range.is_divisible() ? &quot;yes&quot; : &quot;no&quot;) &lt;&lt; endl;
    cout &lt;&lt; &quot;Is empty: &quot; &lt;&lt; (range.empty() ? &quot;yes&quot; : &quot;no&quot;) &lt;&lt; endl;

    // Splitting range
    blocked_range&lt;int&gt; left(range, split());
    cout &lt;&lt; &quot;\\nAfter split:&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Left:  [&quot; &lt;&lt; left.begin() &lt;&lt; &quot;, &quot; &lt;&lt; left.end() &lt;&lt; &quot;)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Right: [&quot; &lt;&lt; range.begin() &lt;&lt; &quot;, &quot; &lt;&lt; range.end() &lt;&lt; &quot;)&quot; &lt;&lt; endl;
}

// ============= Example 2: Grain Size Impact =============

void example2_grain_size() {
    cout &lt;&lt; &quot;\\n=== Example 2: Grain Size Impact ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N, 1);

    cout &lt;&lt; &quot;Testing different grain sizes on &quot; &lt;&lt; N &lt;&lt; &quot; elements:&quot; &lt;&lt; endl;

    for(int grain : {1, 100, 1000, 10000, 100000}) {
        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N, grain),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] *= 2;
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;  Grain &quot; &lt;&lt; grain &lt;&lt; &quot;: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nOptimal grain size balances overhead vs load balancing&quot; &lt;&lt; endl;
}

// ============= Example 3: blocked_range2d =============

void example3_2d_range() {
    cout &lt;&lt; &quot;\\n=== Example 3: blocked_range2d ===&quot; &lt;&lt; endl;

    const int ROWS = 1000;
    const int COLS = 1000;
    vector&lt;vector&lt;double&gt;&gt; matrix(ROWS, vector&lt;double&gt;(COLS, 1.0));

    auto start = high_resolution_clock::now();

    // 2D parallel iteration
    parallel_for(blocked_range2d&lt;int&gt;(0, ROWS, 0, COLS),
        [&amp;](blocked_range2d&lt;int&gt; r) {
            for(int i = r.rows().begin(); i != r.rows().end(); ++i) {
                for(int j = r.cols().begin(); j != r.cols().end(); ++j) {
                    matrix[i][j] = i * j;
                }
            }
        });

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Processed &quot; &lt;&lt; ROWS &lt;&lt; &quot;x&quot; &lt;&lt; COLS &lt;&lt; &quot; matrix&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;blocked_range2d splits in both dimensions&quot; &lt;&lt; endl;
}

// ============= Example 4: blocked_range3d =============

void example4_3d_range() {
    cout &lt;&lt; &quot;\\n=== Example 4: blocked_range3d ===&quot; &lt;&lt; endl;

    const int PAGES = 100;
    const int ROWS = 100;
    const int COLS = 100;

    // 3D array
    vector&lt;vector&lt;vector&lt;int&gt;&gt;&gt; cube(PAGES,
        vector&lt;vector&lt;int&gt;&gt;(ROWS, vector&lt;int&gt;(COLS, 0)));

    auto start = high_resolution_clock::now();

    // 3D parallel iteration
    parallel_for(blocked_range3d&lt;int&gt;(0, PAGES, 0, ROWS, 0, COLS),
        [&amp;](blocked_range3d&lt;int&gt; r) {
            for(int p = r.pages().begin(); p != r.pages().end(); ++p) {
                for(int i = r.rows().begin(); i != r.rows().end(); ++i) {
                    for(int j = r.cols().begin(); j != r.cols().end(); ++j) {
                        cube[p][i][j] = p + i + j;
                    }
                }
            }
        });

    auto time = duration_cast&lt;milliseconds&gt;(
        high_resolution_clock::now() - start).count();

    cout &lt;&lt; &quot;Processed &quot; &lt;&lt; PAGES &lt;&lt; &quot;x&quot; &lt;&lt; ROWS &lt;&lt; &quot;x&quot; &lt;&lt; COLS &lt;&lt; &quot; cube&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;

// ============= Example 5: Custom Range Type =============

class CustomRange {
    size_t my_begin;
    size_t my_end;
    size_t my_grain;

public:
    CustomRange(size_t b, size_t e, size_t g = 1)
        : my_begin(b), my_end(e), my_grain(g) {}

    // Required: splitting constructor
    CustomRange(CustomRange&amp; r, split)
        : my_begin(r.my_begin), my_grain(r.my_grain) {
        size_t mid = (r.my_begin + r.my_end) / 2;
        my_end = mid;
        r.my_begin = mid;
    }

    // Required methods
    size_t begin() const { return my_begin; }
    size_t end() const { return my_end; }
    size_t grainsize() const { return my_grain; }
    bool empty() const { return my_begin &gt;= my_end; }
    bool is_divisible() const {
        return (my_end - my_begin) &gt; my_grain;
    }
};

<pre><code class="language-cpp">/*
 * TBB DETERMINISTIC PARALLELISM - Reproducible Results
 * 
 * DEFINITION:
 * Deterministic parallelism ensures that parallel algorithms produce
 * the same results on every run, regardless of thread scheduling.
 * 
 * KEY CONCEPTS:
 * - Non-determinism sources: Race conditions, floating-point order
 * - Deterministic patterns: No shared mutable state, associative operations
 * - Tools: static_partitioner, ordered operations, atomic reductions
 * 
 * TECHNIQUES:
 * 1. Use static_partitioner for reproducible work division
 * 2. Avoid shared mutable state (use thread-local storage)
 * 3. Use deterministic reduce operations
 * 4. Ordered operations where needed
 * 5. Careful with floating-point (not truly associative)
 * 
 * WHY DETERMINISM MATTERS:
 * - Debugging and testing
 * - Reproducible scientific results
 * - Compliance requirements
 * - Easier reasoning about code
 * 
 * TRADE-OFFS:
 * + Reproducible results
 * + Easier debugging
 * - May sacrifice some performance
 * - More restrictive programming model
 */

#include &lt;iostream&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;cmath&gt;
#include &lt;iomanip&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/parallel_reduce.h&gt;
#include &lt;tbb/blocked_range.h&gt;
#include &lt;tbb/partitioner.h&gt;
#include &lt;tbb/enumerable_thread_specific.h&gt;
#include &lt;tbb/spin_mutex.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Non-Deterministic vs Deterministic =============

void example1_determinism() {
    cout &lt;&lt; &quot;\\n=== Example 1: Non-Deterministic vs Deterministic ===&quot; &lt;&lt; endl;

    const int N = 1000;
    vector&lt;int&gt; data(N);

    // Initialize
    for(int i = 0; i &lt; N; ++i) data[i] = i;

    cout &lt;&lt; &quot;Running same computation multiple times:&quot; &lt;&lt; endl;

    // Non-deterministic (auto_partitioner)
    cout &lt;&lt; &quot;\\nWith auto_partitioner (may vary):&quot; &lt;&lt; endl;
    for(int run = 1; run &lt;= 3; ++run) {
        int checksum = 0;
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    // Order of operations may vary
                    checksum += data[i];  // Not thread-safe, but for demo
                }
            },
            auto_partitioner());
        cout &lt;&lt; &quot;  Run &quot; &lt;&lt; run &lt;&lt; &quot; checksum: &quot; &lt;&lt; checksum &lt;&lt; endl;
    }

    // Deterministic (static_partitioner + proper reduction)
    cout &lt;&lt; &quot;\\nWith static_partitioner (consistent):&quot; &lt;&lt; endl;
    for(int run = 1; run &lt;= 3; ++run) {
        int sum = parallel_reduce(
            blocked_range&lt;int&gt;(0, N),
            0,
            [&amp;](blocked_range&lt;int&gt; r, int init) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    init += data[i];
                }
                return init;
            },
            [](int x, int y) { return x + y; },
            static_partitioner());
        cout &lt;&lt; &quot;  Run &quot; &lt;&lt; run &lt;&lt; &quot; sum: &quot; &lt;&lt; sum &lt;&lt; endl;
    }
}

// ============= Example 2: Deterministic Reduction =============

void example2_deterministic_reduce() {
    cout &lt;&lt; &quot;\\n=== Example 2: Deterministic Reduction ===&quot; &lt;&lt; endl;

    const int N = 1000000;
    vector&lt;double&gt; data(N, 1.5);

    cout &lt;&lt; &quot;Computing sum with different methods:&quot; &lt;&lt; endl;

    // Method 1: Deterministic with static_partitioner
    double sum1 = parallel_reduce(
        blocked_range&lt;int&gt;(0, N),
        0.0,
        [&amp;](blocked_range&lt;int&gt; r, double init) {
            for(int i = r.begin(); i != r.end(); ++i) {
                init += data[i];
            }
            return init;
        },
        [](double x, double y) { return x + y; },
        static_partitioner());

    // Method 2: Run again - should be identical
    double sum2 = parallel_reduce(
        blocked_range&lt;int&gt;(0, N),
        0.0,
        [&amp;](blocked_range&lt;int&gt; r, double init) {
            for(int i = r.begin(); i != r.end(); ++i) {
                init += data[i];
            }
            return init;
        },
        [](double x, double y) { return x + y; },
        static_partitioner());

    cout &lt;&lt; fixed &lt;&lt; setprecision(10);
    cout &lt;&lt; &quot;Sum 1: &quot; &lt;&lt; sum1 &lt;&lt; endl;
    cout &lt;&lt; &quot;Sum 2: &quot; &lt;&lt; sum2 &lt;&lt; endl;
    cout &lt;&lt; &quot;Difference: &quot; &lt;&lt; abs(sum1 - sum2) &lt;&lt; endl;
    cout &lt;&lt; &quot;With static_partitioner: results are deterministic&quot; &lt;&lt; endl;
}

// ============= Example 3: Thread-Local Storage for Determinism =============

void example3_thread_local() {
    cout &lt;&lt; &quot;\\n=== Example 3: Thread-Local Storage ===&quot; &lt;&lt; endl;

    const int N = 10000;
    vector&lt;int&gt; data(N);
    for(int i = 0; i &lt; N; ++i) data[i] = i;

    // Thread-local accumulators (deterministic combination)
    enumerable_thread_specific&lt;long long&gt; thread_sums(0);

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            long long&amp; local_sum = thread_sums.local();
            for(int i = r.begin(); i != r.end(); ++i) {
                local_sum += data[i];
            }
        },
        static_partitioner());

    // Combine results deterministically
    long long total = thread_sums.combine([](long long a, long long b) {
        return a + b;
    });

    cout &lt;&lt; &quot;Total sum: &quot; &lt;&lt; total &lt;&lt; endl;
    cout &lt;&lt; &quot;Thread-local storage avoids races&quot; &lt;&lt; endl;
}

// ============= Example 4: Ordered Operations =============

void example4_ordered() {
    cout &lt;&lt; &quot;\\n=== Example 4: Ordered Operations ===&quot; &lt;&lt; endl;

    const int N = 100;
    vector&lt;int&gt; results;
    tbb::spin_mutex mtx;

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            vector&lt;int&gt; local_results;
            for(int i = r.begin(); i != r.end(); ++i) {
                local_results.push_back(i * i);
            }

            // Ordered insertion
            tbb::spin_mutex::scoped_lock lock(mtx);
            results.insert(results.end(),
                local_results.begin(), local_results.end());
        },
        static_partitioner());

    cout &lt;&lt; &quot;Collected &quot; &lt;&lt; results.size() &lt;&lt; &quot; results&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;First 10: &quot;;
    for(int i = 0; i &lt; 10 &amp;&amp; i &lt; results.size(); ++i) {
        cout &lt;&lt; results[i] &lt;&lt; &quot; &quot;;
    }
    cout &lt;&lt; endl;
}

                init += data[i];
            }
            return init;
        },
        [](double x, double y) { return x + y; },

    double par_sum2 = parallel_reduce(
        blocked_range&lt;int&gt;(0, N),
        0.0,
        [&amp;](blocked_range&lt;int&gt; r, double init) {
            for(int i = r.begin(); i != r.end(); ++i) {
                init += data[i];
            }
            return init;
        },
        [](double x, double y) { return x + y; },

    cout &lt;&lt; fixed &lt;&lt; setprecision(15);
    cout &lt;&lt; &quot;Sequential: &quot; &lt;&lt; seq_sum &lt;&lt; endl;

// ============= Example 6: Reproducible Random Processing =============

void example6_reproducible() {
    cout &lt;&lt; &quot;\\n=== Example 6: Reproducible Processing ===&quot; &lt;&lt; endl;

    const int N = 1000;
