<pre><code class="language-cpp">/*
 * TBB GLOBAL_CONTROL - Control TBB Runtime Behavior
 * 
 * DEFINITION:
 * global_control allows you to control various aspects of the TBB runtime,
 * most commonly the maximum number of threads.
 * 
 * CONTROL PARAMETERS:
 * - max_allowed_parallelism: Maximum number of worker threads
 * - thread_stack_size: Stack size for worker threads
 * - terminate_on_exception: Behavior on unhandled exceptions
 * 
 * KEY FEATURES:
 * - RAII-based (effect lasts until object destroyed)
 * - Can be nested (innermost takes precedence)
 * - Thread-safe
 * - Affects all TBB operations in scope
 * 
 * WHEN TO USE:
 * - Limit parallelism for resource constraints
 * - Testing with specific thread counts
 * - Mixed workloads (adjust for each phase)
 * - Container/VM environments
 * - Power/thermal management
 */

#define TBB_PREVIEW_GLOBAL_CONTROL 1

#include &lt;iostream&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;thread&gt;
#include &lt;cmath&gt;
#include &lt;tbb/global_control.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/parallel_reduce.h&gt;
#include &lt;tbb/blocked_range.h&gt;
#include &lt;tbb/task_arena.h&gt;

using namespace std;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic Thread Control =============

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic Thread Control ===&quot; &lt;&lt; endl;

    // Default: uses all available cores
    cout &lt;&lt; &quot;Hardware concurrency: &quot; &lt;&lt; thread::hardware_concurrency() &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N, 1);

    // Test with different thread counts
    for(int threads : {1, 2, 4}) {
        global_control gc(global_control::max_allowed_parallelism, threads);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] *= 2;
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; threads &lt;&lt; &quot; threads: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }
}

// ============= Example 2: RAII Scoping =============

void example2_scoping() {
    cout &lt;&lt; &quot;\\n=== Example 2: RAII Scoping ===&quot; &lt;&lt; endl;

    const int N = 1000000;
    vector&lt;double&gt; data(N, 1.0);

    cout &lt;&lt; &quot;Default parallelism:&quot; &lt;&lt; endl;
    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] = data[i] * 1.1;
                }
            });
        auto time = duration_cast&lt;microseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  Time: &quot; &lt;&lt; time &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Limited to 2 threads:&quot; &lt;&lt; endl;
    {
        global_control gc(global_control::max_allowed_parallelism, 2);

        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] = data[i] * 1.1;
                }
            });
        auto time = duration_cast&lt;microseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  Time: &quot; &lt;&lt; time &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    }  // gc destroyed, parallelism restored

    cout &lt;&lt; &quot;Back to default parallelism&quot; &lt;&lt; endl;
}

// ============= Example 3: Nested Controls =============

void example3_nested() {
    cout &lt;&lt; &quot;\\n=== Example 3: Nested Controls ===&quot; &lt;&lt; endl;

    const int N = 5000000;
    vector&lt;int&gt; data(N, 1);

    cout &lt;&lt; &quot;Outer control: 8 threads&quot; &lt;&lt; endl;
    global_control outer(global_control::max_allowed_parallelism, 8);

    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] += 1;
                }
            });
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  Time with 8 threads: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    {
        cout &lt;&lt; &quot;Inner control: 2 threads (overrides outer)&quot; &lt;&lt; endl;
        global_control inner(global_control::max_allowed_parallelism, 2);

        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] += 1;
                }
            });
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  Time with 2 threads: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }  // inner destroyed

    {
        cout &lt;&lt; &quot;Back to outer: 8 threads&quot; &lt;&lt; endl;
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] += 1;
                }
            });
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  Time with 8 threads: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }
}

// ============= Example 4: Performance Scaling =============

void example4_scaling() {
    cout &lt;&lt; &quot;\\n=== Example 4: Performance Scaling ===&quot; &lt;&lt; endl;

    const int N = 20000000;

    cout &lt;&lt; &quot;Measuring speedup with different thread counts:&quot; &lt;&lt; endl;

    long long baseline_time = 0;

    for(int threads = 1; threads &lt;= thread::hardware_concurrency(); threads *= 2) {
        global_control gc(global_control::max_allowed_parallelism, threads);

        auto start = high_resolution_clock::now();

        long long sum = parallel_reduce(
            blocked_range&lt;int&gt;(0, N),
            0LL,
            [](blocked_range&lt;int&gt; r, long long init) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    init += i;
                }
                return init;
            },
            [](long long x, long long y) { return x + y; });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        if(threads == 1) baseline_time = time;
        double speedup = (double)baseline_time / time;

        cout &lt;&lt; threads &lt;&lt; &quot; thread(s): &quot; &lt;&lt; time &lt;&lt; &quot; ms, &quot;
             &lt;&lt; &quot;speedup: &quot; &lt;&lt; speedup &lt;&lt; &quot;x&quot; &lt;&lt; endl;
    }
}

// ============= Example 5: Mixed Workload =============

void heavy_computation(vector&lt;double&gt;&amp; data) {
    parallel_for(blocked_range&lt;int&gt;(0, data.size()),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                for(int j = 0; j &lt; 100; ++j) {
                    data[i] = sqrt(data[i] + 0.1);
                }
            }
        });
}

void light_computation(vector&lt;int&gt;&amp; data) {
    parallel_for(blocked_range&lt;int&gt;(0, data.size()),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                data[i] *= 2;
            }
        });
}

void example5_mixed_workload() {
    cout &lt;&lt; &quot;\\n=== Example 5: Mixed Workload ===&quot; &lt;&lt; endl;

    vector&lt;double&gt; heavy_data(10000, 1.0);
    vector&lt;int&gt; light_data(1000000, 1);

    cout &lt;&lt; &quot;Heavy computation (use all cores):&quot; &lt;&lt; endl;
    {
        global_control gc(global_control::max_allowed_parallelism,
            thread::hardware_concurrency());

        auto start = high_resolution_clock::now();
        heavy_computation(heavy_data);
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;  Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Light computation (limit threads to avoid overhead):&quot; &lt;&lt; endl;
    {
        global_control gc(global_control::max_allowed_parallelism, 4);

        auto start = high_resolution_clock::now();
        light_computation(light_data);
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;  Time: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }
}

// ============= Example 7: Dynamic Thread Adjustment =============

void example7_dynamic() {

        int threads = max(1, (int)(thread::hardware_concurrency() * load_percent / 100));

        global_control gc(global_control::max_allowed_parallelism, threads);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] = sqrt(data[i] + 0.01);
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; load_percent &lt;&lt; &quot;% capacity (&quot; &lt;&lt; threads &lt;&lt; &quot; threads): &quot;
             &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }
}

<pre><code class="language-cpp">/*
 * TBB TASK_SCHEDULER_OBSERVER - Monitor Thread Lifecycle
 * 
 * DEFINITION:
 * task_scheduler_observer allows you to observe and respond to
 * thread entry/exit events in the TBB task scheduler.
 * 
 * KEY METHODS:
 * - on_scheduler_entry(bool): Called when thread joins scheduler
 * - on_scheduler_exit(bool): Called when thread leaves scheduler
 * - observe(bool): Enable/disable observation
 * 
 * COMMON USE CASES:
 * - Thread-local initialization (pinning, affinity)
 * - Performance monitoring and profiling
 * - Resource management per thread
 * - Custom thread naming
 * - Integration with other threading systems
 * - Debug tracing
 * 
 * PARAMETERS:
 * - is_worker: true for TBB worker threads, false for master thread
 * 
 * WHEN TO USE:
 * - Need thread-specific setup/teardown
 * - Performance profiling
 * - CPU affinity/pinning
 * - Thread-local resource management
 * - Debugging thread behavior
 */

#include &lt;iostream&gt;
#include &lt;cmath&gt;
#include &lt;thread&gt;
#include &lt;atomic&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;tbb/task_scheduler_observer.h&gt;
#include &lt;tbb/enumerable_thread_specific.h&gt;
#include &lt;tbb/spin_mutex.h&gt;
#include &lt;tbb/task_arena.h&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/blocked_range.h&gt;

using namespace std;
using std::atomic;
using namespace tbb;
using namespace chrono;

// ============= Example 1: Basic Observer =============

class SimpleObserver : public task_scheduler_observer {
    std::atomic&lt;int&gt; entry_count;
    std::atomic&lt;int&gt; exit_count;

public:
    SimpleObserver() : entry_count(0), exit_count(0) {
        observe(true);  // Start observing
    }

    void on_scheduler_entry(bool is_worker) override {
        entry_count++;
        cout &lt;&lt; &quot;  Thread &quot; &lt;&lt; this_thread::get_id() &lt;&lt; &quot; entered &quot;
             &lt;&lt; (is_worker ? &quot;(worker)&quot; : &quot;(master)&quot;) &lt;&lt; endl;
    }

    void on_scheduler_exit(bool is_worker) override {
        exit_count++;
        cout &lt;&lt; &quot;  Thread &quot; &lt;&lt; this_thread::get_id() &lt;&lt; &quot; exited &quot;
             &lt;&lt; (is_worker ? &quot;(worker)&quot; : &quot;(master)&quot;) &lt;&lt; endl;
    }

    void print_stats() {
        cout &lt;&lt; &quot;Total entries: &quot; &lt;&lt; entry_count &lt;&lt; endl;
        cout &lt;&lt; &quot;Total exits: &quot; &lt;&lt; exit_count &lt;&lt; endl;
    }
};

void example1_basic() {
    cout &lt;&lt; &quot;\\n=== Example 1: Basic Observer ===&quot; &lt;&lt; endl;

    SimpleObserver observer;

    parallel_for(blocked_range&lt;int&gt;(0, 100),
        [](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                volatile int x = i * i;  // Some work
            }
        });

    this_thread::sleep_for(milliseconds(100));  // Let threads finish
    observer.print_stats();
}

// ============= Example 2: Performance Monitoring =============

class PerformanceObserver : public task_scheduler_observer {
    struct ThreadInfo {
        chrono::high_resolution_clock::time_point start_time;
        long long total_time_us;
        int task_count;

        ThreadInfo() : total_time_us(0), task_count(0) {}
    };

    tbb::enumerable_thread_specific&lt;ThreadInfo&gt; thread_data;

public:
    PerformanceObserver() {
        observe(true);
    }

    void on_scheduler_entry(bool is_worker) override {
        auto&amp; info = thread_data.local();
        info.start_time = high_resolution_clock::now();
    }

    void on_scheduler_exit(bool is_worker) override {
        auto&amp; info = thread_data.local();
        auto elapsed = duration_cast&lt;microseconds&gt;(
            high_resolution_clock::now() - info.start_time).count();
        info.total_time_us += elapsed;
    }

    void print_stats() {
        cout &lt;&lt; &quot;\\nPer-thread statistics:&quot; &lt;&lt; endl;
        int thread_num = 0;
        long long total_us = 0;

        for(auto&amp; info : thread_data) {
            cout &lt;&lt; &quot;  Thread &quot; &lt;&lt; thread_num++ &lt;&lt; &quot;: &quot;
                 &lt;&lt; info.total_time_us &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
            total_us += info.total_time_us;
        }

        cout &lt;&lt; &quot;Total time across all threads: &quot; &lt;&lt; total_us &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    }
};

void example2_performance() {
    cout &lt;&lt; &quot;\\n=== Example 2: Performance Monitoring ===&quot; &lt;&lt; endl;

    PerformanceObserver observer;

    const int N = 1000000;
    vector&lt;double&gt; data(N, 1.0);

    parallel_for(blocked_range&lt;int&gt;(0, N),
        [&amp;](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                data[i] = sqrt(data[i] + 1.0);
            }
        });

    this_thread::sleep_for(milliseconds(100));
    observer.print_stats();
}

// ============= Example 3: Thread Counting =============

class ThreadCounter : public task_scheduler_observer {
    std::atomic&lt;int&gt; active_threads;
    std::atomic&lt;int&gt; max_threads;
    std::atomic&lt;int&gt; total_threads;

public:
    ThreadCounter() : active_threads(0), max_threads(0), total_threads(0) {
        observe(true);
    }

    void on_scheduler_entry(bool is_worker) override {
        int current = ++active_threads;
        total_threads++;

        // Update max
        int expected = max_threads;
        while(current &gt; expected &amp;&amp;
              !max_threads.compare_exchange_weak(expected, current)) {}
    }

    void on_scheduler_exit(bool is_worker) override {
        --active_threads;
    }

    void print_stats() {
        cout &lt;&lt; &quot;Active threads: &quot; &lt;&lt; active_threads &lt;&lt; endl;
        cout &lt;&lt; &quot;Max concurrent threads: &quot; &lt;&lt; max_threads &lt;&lt; endl;
        cout &lt;&lt; &quot;Total thread entries: &quot; &lt;&lt; total_threads &lt;&lt; endl;
    }
};

void example3_counting() {
    cout &lt;&lt; &quot;\\n=== Example 3: Thread Counting ===&quot; &lt;&lt; endl;

    ThreadCounter counter;

    parallel_for(blocked_range&lt;int&gt;(0, 10000),
        [](blocked_range&lt;int&gt; r) {
            for(int i = r.begin(); i != r.end(); ++i) {
                this_thread::sleep_for(microseconds(1));
            }
        });

    this_thread::sleep_for(milliseconds(100));
    counter.print_stats();
}

// ============= Example 4: Resource Management =============

class ResourceManager : public task_scheduler_observer {
    struct ThreadResources {
        vector&lt;int&gt; buffer;
        int allocations;

        ThreadResources() : buffer(1000, 0), allocations(0) {}
        ~ThreadResources() {}
    };

    enumerable_thread_specific&lt;ThreadResources&gt; resources;

public:
    ResourceManager() {
        observe(true);
    }

    void on_scheduler_entry(bool is_worker) override {
        auto&amp; res = resources.local();
        res.allocations++;
        // Initialize thread-local resources
    }

    void on_scheduler_exit(bool is_worker) override {
        // Cleanup happens automatically via RAII
    }

    void print_stats() {
        cout &lt;&lt; &quot;Resources allocated per thread:&quot; &lt;&lt; endl;
        int thread_num = 0;
        for(auto&amp; res : resources) {
            cout &lt;&lt; &quot;  Thread &quot; &lt;&lt; thread_num++ &lt;&lt; &quot;: &quot;
                 &lt;&lt; res.allocations &lt;&lt; &quot; allocations&quot; &lt;&lt; endl;
        }
    }
};

    parallel_for(blocked_range&lt;int&gt;(0, 1000),

}

// ============= Example 5: Debug Tracing =============

class DebugTracer : public task_scheduler_observer {
    tbb::spin_mutex mtx;

public:
    DebugTracer() {
        observe(true);

    void on_scheduler_entry(bool is_worker) override {
        tbb::spin_mutex::scoped_lock lock(mtx);
        cout &lt;&lt; &quot;[TRACE] Thread &quot; &lt;&lt; this_thread::get_id()
             &lt;&lt; &quot; entered scheduler &quot;
             &lt;&lt; (is_worker ? &quot;(worker)&quot; : &quot;(master)&quot;) &lt;&lt; endl;
    }

    void on_scheduler_exit(bool is_worker) override {
        tbb::spin_mutex::scoped_lock lock(mtx);
        cout &lt;&lt; &quot;[TRACE] Thread &quot; &lt;&lt; this_thread::get_id()
             &lt;&lt; &quot; exited scheduler &quot;
             &lt;&lt; (is_worker ? &quot;(worker)&quot; : &quot;(master)&quot;) &lt;&lt; endl;
    }
};

// ============= Example 7: Enable/Disable Observation =============

class ToggleObserver : public task_scheduler_observer {
    std::atomic&lt;int&gt; event_count;

public:
    ToggleObserver() : event_count(0) {
        // Don't observe initially
    }

    void on_scheduler_entry(bool) override {
        event_count++;

    void enable() {
        cout &lt;&lt; &quot;Enabling observation&quot; &lt;&lt; endl;

    void disable() {
        cout &lt;&lt; &quot;Disabling observation&quot; &lt;&lt; endl;
        observe(false);

    int get_count() const { return event_count; }
};

<pre><code class="language-cpp">#define TBB_PREVIEW_GLOBAL_CONTROL 1

/*
 * TBB PERFORMANCE TUNING - Optimization Techniques
 * 
 * COMPREHENSIVE GUIDE TO TBB PERFORMANCE OPTIMIZATION
 * 
 * PERFORMANCE FACTORS:
 * 1. Grain Size: Balance overhead vs load balancing
 * 2. Partitioner Choice: auto, simple, static, affinity
 * 3. Concurrency Control: Thread count, arenas
 * 4. Memory: Allocators, false sharing, cache locality
 * 5. Algorithm Choice: For, reduce, scan, pipeline
 * 6. Data Structures: Concurrent containers
 * 
 * OPTIMIZATION STRATEGIES:
 * - Measure first (profile before optimizing)
 * - Start with defaults
 * - Tune grain size
 * - Choose right partitioner
 * - Avoid false sharing
 * - Use scalable allocators
 * - Minimize synchronization
 * - Prefer lock-free when possible
 * 
 * COMMON PITFALLS:
 * - Too fine-grained parallelism
 * - False sharing
 * - Excessive synchronization
 * - Wrong algorithm choice
 * - Oversubscription
 */

#include &lt;iostream&gt;
#include &lt;thread&gt;
#include &lt;algorithm&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;cmath&gt;
#include &lt;atomic&gt;
#include &lt;tbb/parallel_for.h&gt;
#include &lt;tbb/parallel_reduce.h&gt;
#include &lt;tbb/blocked_range.h&gt;
#include &lt;tbb/partitioner.h&gt;
#include &lt;tbb/scalable_allocator.h&gt;
#include &lt;tbb/cache_aligned_allocator.h&gt;

// ============= Example 1: Grain Size Tuning =============

void example1_grain_size() {
    cout &lt;&lt; &quot;\\n=== Example 1: Grain Size Tuning ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;double&gt; data(N, 1.0);

    cout &lt;&lt; &quot;Testing different grain sizes:&quot; &lt;&lt; endl;

    // Light work per iteration
    auto light_work = [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i) {
            data[i] += 1.0;
        }
    };

    for(int grain : {100, 1000, 10000, 100000}) {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N, grain), light_work);
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;  Grain &quot; &lt;&lt; grain &lt;&lt; &quot;: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nRule of thumb: grain size = 1000-10000 iterations&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;More work per iteration → larger grain&quot; &lt;&lt; endl;
}

// ============= Example 2: Partitioner Selection =============

void example2_partitioners() {
    cout &lt;&lt; &quot;\\n=== Example 2: Partitioner Selection ===&quot; &lt;&lt; endl;

    const int N = 20000000;
    vector&lt;int&gt; data(N);

    auto uniform_work = [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i) {
            data[i] = i * 2;
        }
    };

    cout &lt;&lt; &quot;Uniform workload:&quot; &lt;&lt; endl;

    // auto_partitioner
    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N), uniform_work, auto_partitioner());
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  auto_partitioner:   &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    // simple_partitioner (best for uniform)
    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N), uniform_work, simple_partitioner());
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  simple_partitioner: &quot; &lt;&lt; time &lt;&lt; &quot; ms (best)&quot; &lt;&lt; endl;
    }

    // static_partitioner
    {
        auto start = high_resolution_clock::now();
        parallel_for(blocked_range&lt;int&gt;(0, N), uniform_work, static_partitioner());
        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();
        cout &lt;&lt; &quot;  static_partitioner: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }
}

// ============= Example 3: False Sharing Elimination =============

struct CounterUnaligned {
    std::atomic&lt;long long&gt; value;
};

struct CounterAligned {
    alignas(64) std::atomic&lt;long long&gt; value;
};

void example3_false_sharing() {
    cout &lt;&lt; &quot;\\n=== Example 3: False Sharing Elimination ===&quot; &lt;&lt; endl;

    const int N = 50000000;
    const int THREADS = 4;

    // Without alignment (false sharing)
    {
        vector&lt;CounterUnaligned&gt; counters(THREADS);
        for(auto&amp; c : counters) c.value = 0;

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int tid = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    counters[tid].value++;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;Without alignment: &quot; &lt;&lt; time &lt;&lt; &quot; ms (slow due to false sharing)&quot; &lt;&lt; endl;
    }

    // With alignment (no false sharing)
    {
        vector&lt;CounterAligned&gt; counters(THREADS);
        for(auto&amp; c : counters) c.value = 0;

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, THREADS),
            [&amp;](blocked_range&lt;int&gt; r) {
                int tid = r.begin();
                for(int i = 0; i &lt; N / THREADS; ++i) {
                    counters[tid].value++;
                }
            }, simple_partitioner());

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;With alignment:    &quot; &lt;&lt; time &lt;&lt; &quot; ms (fast!)&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nKey: Align thread-local data to cache line (64 bytes)&quot; &lt;&lt; endl;
}

// ============= Example 4: Scalable Allocators =============

void example4_allocators() {
    cout &lt;&lt; &quot;\\n=== Example 4: Scalable Allocators ===&quot; &lt;&lt; endl;

    const int N = 1000;
    const int SIZE = 10000;

    // Standard allocator
    {
        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    vector&lt;int&gt; temp(SIZE);
                    temp[0] = i;
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;std::allocator:      &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    // Scalable allocator
    {
        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    vector&lt;int, scalable_allocator&lt;int&gt;&gt; temp(SIZE);
                    temp[0] = i;
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;scalable_allocator:  &quot; &lt;&lt; time &lt;&lt; &quot; ms (faster!)&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nKey: Use scalable_allocator for parallel allocations&quot; &lt;&lt; endl;
}

// ============= Example 5: Thread-Local Storage =============

void example5_thread_local() {
    cout &lt;&lt; &quot;\\n=== Example 5: Thread-Local Storage ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;int&gt; data(N);
    for(int i = 0; i &lt; N; ++i) data[i] = i;

    // With locking (slow)
    {
        long long sum = 0;
        tbb::spin_mutex mtx;

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                long long local_sum = 0;
                for(int i = r.begin(); i != r.end(); ++i) {
                    local_sum += data[i];
                }
                tbb::spin_mutex::scoped_lock lock(mtx);
                sum += local_sum;
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;With mutex: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    // Thread-local (fast)
    {
        enumerable_thread_specific&lt;long long&gt; thread_sums(0);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                long long&amp; local_sum = thread_sums.local();
                for(int i = r.begin(); i != r.end(); ++i) {
                    local_sum += data[i];
                }
            });

        long long sum = thread_sums.combine([](long long a, long long b) {
            return a + b;
        });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;Thread-local: &quot; &lt;&lt; time &lt;&lt; &quot; ms (faster!)&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nKey: Minimize synchronization with thread-local storage&quot; &lt;&lt; endl;
}

// ============= Example 6: Algorithm Selection =============

void example6_algorithms() {
    cout &lt;&lt; &quot;\\n=== Example 6: Algorithm Selection ===&quot; &lt;&lt; endl;

    const int N = 100000000;

    // parallel_for with manual reduction (slower)
    {
        tbb::atomic&lt;long long&gt; sum;
        sum = 0;

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                long long local = 0;
                for(int i = r.begin(); i != r.end(); ++i) {
                    local += i;
                }
                sum += local;
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;parallel_for + atomic: &quot; &lt;&lt; time &lt;&lt; &quot; ms&quot; &lt;&lt; endl;
    }

    // parallel_reduce (faster)
    {
        auto start = high_resolution_clock::now();

        long long sum = parallel_reduce(
            blocked_range&lt;int&gt;(0, N),
            0LL,
            [](blocked_range&lt;int&gt; r, long long init) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    init += i;
                }
                return init;
            },
            [](long long x, long long y) { return x + y; });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        cout &lt;&lt; &quot;parallel_reduce:       &quot; &lt;&lt; time &lt;&lt; &quot; ms (faster!)&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;\\nKey: Use parallel_reduce for reductions, not parallel_for&quot; &lt;&lt; endl;
}

// ============= Example 7: Thread Count Optimization =============

void example7_thread_count() {
    cout &lt;&lt; &quot;\\n=== Example 7: Thread Count Optimization ===&quot; &lt;&lt; endl;

    const int N = 10000000;
    vector&lt;double&gt; data(N, 1.0);

    cout &lt;&lt; &quot;Performance with different thread counts:&quot; &lt;&lt; endl;

    long long baseline = 0;

    for(int threads = 1; threads &lt;= thread::hardware_concurrency(); threads *= 2) {
        global_control gc(global_control::max_allowed_parallelism, threads);

        auto start = high_resolution_clock::now();

        parallel_for(blocked_range&lt;int&gt;(0, N),
            [&amp;](blocked_range&lt;int&gt; r) {
                for(int i = r.begin(); i != r.end(); ++i) {
                    data[i] = sqrt(data[i] + 1.0);
                }
            });

        auto time = duration_cast&lt;milliseconds&gt;(
            high_resolution_clock::now() - start).count();

        if(threads == 1) baseline = time;
        double speedup = (double)baseline / time;
        double efficiency = speedup / threads * 100;

        cout &lt;&lt; &quot;  &quot; &lt;&lt; threads &lt;&lt; &quot; threads: &quot; &lt;&lt; time &lt;&lt; &quot; ms, &quot;
             &lt;&lt; &quot;speedup: &quot; &lt;&lt; speedup &lt;&lt; &quot;x, &quot;
             &lt;&lt; &quot;efficiency: &quot; &lt;&lt; efficiency &lt;&lt; &quot;%&quot; &lt;&lt; endl;
    }
}

<h2 id="-introduction">📖 Introduction</h2>
<h3 id="what-is-tbb">What is TBB?</h3>
<p>Intel Threading Building Blocks (TBB) is a C++ template library for <strong>parallel programming</strong> that:</p>
<ul>
<li><strong>Abstracts low-level threading</strong>: No manual thread management</li>
<li><strong>Uses task-based parallelism</strong>: Better than thread-based approaches</li>
<li><strong>Implements work-stealing</strong>: Automatic load balancing</li>
<li><strong>Provides high-level constructs</strong>: Parallel algorithms, concurrent containers</li>
<li><strong>Is portable</strong>: Works across Windows, Linux, macOS</li>
<li><strong>Scales automatically</strong>: Adapts to available cores</li>
</ul>
<h3 id="why-use-tbb">Why Use TBB?</h3>

<thead>
<tr>
<th>Advantage</th>
<th>Description</th>
</tr>
</thead>

<tr>
<td><strong>Productivity</strong></td>
<td>Write parallel code faster with high-level abstractions</td>
</tr>
<tr>
<td><strong>Performance</strong></td>
<td>Work-stealing scheduler ensures optimal CPU utilization</td>
</tr>
<tr>
<td><strong>Scalability</strong></td>
<td>Automatically scales from 1 to 1000+ cores</td>
</tr>
<tr>
<td><strong>Safety</strong></td>

</tr>

</tr>

<h2 id="-core-concepts">🎯 Core Concepts</h2>
<h3 id="1-task-based-parallelism">1. Task-Based Parallelism</h3>
<p><strong>Traditional Threading:</strong></p>
<pre><code class="language-cpp">// Manual thread management (error-prone, doesn't scale)
vector&lt;thread&gt; threads;
for(int i = 0; i &lt; num_threads; ++i) {
    threads.emplace_back([i]() { work(i); });
}
for(auto&amp; t : threads) t.join();
</code></pre>
<p><strong>TBB Tasks:</strong></p>
<pre><code class="language-cpp">// High-level, scalable (TBB manages threads)
parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i)
            work(i);
    });
</code></pre>
<h3 id="2-work-stealing-scheduler">2. Work-Stealing Scheduler</h3>
<p>TBB uses a sophisticated <strong>work-stealing scheduler</strong>:</p>
<pre><code>Thread 1: [====Task===]  [===Task===]  [=Task=]  (busy)
Thread 2: [==Task==]                                (idle) -&gt; STEAL from Thread 1!
Thread 3: [=====Task=====]  [====Task====]         (busy)
Thread 4: [===Task===]                              (idle) -&gt; STEAL from Thread 3!
</code></pre>
<p><strong>Benefits:</strong></p>
<ul>
<li>Idle threads steal work from busy threads</li>
<li>Automatic load balancing</li>
<li>Better than static work distribution</li>
<li>Handles irregular workloads well</li>
</ul>
<h3 id="3-grain-size">3. Grain Size</h3>
<p><strong>Grain size</strong> = Amount of work per task</p>
<pre><code class="language-cpp">parallel_for(blocked_range&lt;int&gt;(0, N, grain_size),  // &lt;-- grain size
    [&amp;](blocked_range&lt;int&gt; r) { /* work */ });
</code></pre>
<p><strong>Rules of Thumb:</strong></p>
<ul>
<li>Each task should take <strong>10-100 microseconds</strong></li>
<li>Too small → overhead dominates</li>
<li>Too large → poor load balancing</li>
<li>Let TBB choose (default) or tune manually</li>
</ul>
<h3 id="4-partitioners">4. Partitioners</h3>
<p>Control how work is divided:</p>
<table>
<thead>
<tr>
<th>Partitioner</th>
<th>Use When</th>
<th>Characteristics</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>auto_partitioner</code></td>
<td>Most cases (default)</td>
<td>Automatic grain size, work stealing</td>
</tr>
<tr>
<td><code>static_partitioner</code></td>
<td>Uniform work</td>
<td>Fixed division, no stealing</td>
</tr>
<tr>

<td>Deterministic results</td>
<td>Simple splitting</td>
</tr>
<tr>

<td>Cache locality important</td>
<td>Remembers assignment</td>
</tr>
</tbody>
</table>

<h2 id="-parallel-algorithms">🚀 Parallel Algorithms</h2>
<h3 id="parallel_for---independent-iterations">parallel_for - Independent Iterations</h3>
<p><strong>Purpose:</strong> Execute loop iterations in parallel</p>
<p><strong>Syntax:</strong></p>
<pre><code class="language-cpp">parallel_for(range, body, [partitioner])
</code></pre>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">vector&lt;int&gt; data(1000000);
parallel_for(blocked_range&lt;int&gt;(0, data.size()),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i) {
            data[i] = expensive_computation(i);
        }
    });
</code></pre>
<p><strong>When to Use:</strong></p>
<ul>
<li>✅ Loop iterations are independent</li>
<li>✅ Each iteration does significant work</li>
<li>✅ No data dependencies between iterations</li>
</ul>
<p><strong>When NOT to Use:</strong></p>
<ul>
<li>❌ Loop body is too fast (&lt;1μs per iteration)</li>
<li>❌ Iterations have dependencies</li>
<li>❌ Order matters and can&rsquo;t be changed</li>
</ul>
<h3 id="parallel_reduce---aggregation">parallel_reduce - Aggregation</h3>
<p><strong>Purpose:</strong> Combine values from a range (sum, min, max, etc.)</p>
<p><strong>Syntax:</strong></p>
<pre><code class="language-cpp">result = parallel_reduce(range, identity, reduce_body, join_body)
</code></pre>
<p><strong>Example - Sum:</strong></p>
<pre><code class="language-cpp">double sum = parallel_reduce(
    blocked_range&lt;int&gt;(0, N),
    0.0,  // identity
    [&amp;](blocked_range&lt;int&gt; r, double partial) {
        for(int i = r.begin(); i != r.end(); ++i)
            partial += data[i];
        return partial;
    },
    [](double a, double b) { return a + b; }  // join
);
</code></pre>
<p><strong>Requirements:</strong></p>
<ul>
<li>Operation must be <strong>associative</strong>: (a ⊕ b) ⊕ c = a ⊕ (b ⊕ c)</li>
<li>Need an <strong>identity value</strong>: identity ⊕ x = x</li>
<li>Join operation combines partial results</li>
</ul>
<p><strong>Common Reductions:</strong></p>
<pre><code class="language-cpp">// Sum
parallel_reduce(range, 0, reduce, plus&lt;int&gt;())

// Product
parallel_reduce(range, 1, reduce, multiplies&lt;int&gt;())

// Min
parallel_reduce(range, INT_MAX, reduce, [](int a, int b) { return min(a,b); })

// Max
parallel_reduce(range, INT_MIN, reduce, [](int a, int b) { return max(a,b); })

// Custom aggregation
parallel_reduce(range, MyStruct(), reduce, join)
</code></pre>
<h3 id="parallel_scan---prefix-sum">parallel_scan - Prefix Sum</h3>
<p><strong>Purpose:</strong> Compute prefix sums (cumulative sums)</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">// Input:  [1, 2, 3, 4, 5]
// Output: [1, 3, 6, 10, 15]  (cumulative sum)

vector&lt;int&gt; input = {1, 2, 3, 4, 5};
vector&lt;int&gt; output(input.size());

parallel_scan(
    blocked_range&lt;int&gt;(0, input.size()),
    0,  // identity
    [&amp;](blocked_range&lt;int&gt; r, int sum, bool is_final) {
        for(int i = r.begin(); i != r.end(); ++i) {
            sum += input[i];
            if(is_final) output[i] = sum;
        }
        return sum;
    },
    [](int a, int b) { return a + b; }
);
</code></pre>
<h3 id="parallel_sort---parallel-sorting">parallel_sort - Parallel Sorting</h3>
<p><strong>Purpose:</strong> Sort a range in parallel</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">vector&lt;int&gt; data = {3, 1, 4, 1, 5, 9, 2, 6};
parallel_sort(data.begin(), data.end());
// data = {1, 1, 2, 3, 4, 5, 6, 9}

// With custom comparator
parallel_sort(data.begin(), data.end(), greater&lt;int&gt;());
</code></pre>
<p><strong>Performance:</strong></p>
<ul>
<li>O(N log N) like std::sort</li>
<li>Faster than std::sort for large arrays</li>
<li>Uses quicksort + insertion sort hybrid</li>
</ul>
<h3 id="parallel_invoke---function-parallelism">parallel_invoke - Function Parallelism</h3>
<p><strong>Purpose:</strong> Execute multiple functions in parallel</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">parallel_invoke(
    []() { task1(); },
    []() { task2(); },
    []() { task3(); },
    []() { task4(); }
);
// All tasks execute in parallel, waits for all to complete
</code></pre>
<p><strong>Use Cases:</strong></p>
<ul>
<li>Independent function calls</li>
<li>Divide-and-conquer algorithms</li>
<li>Pipeline stages</li>
</ul>
<h3 id="parallel_pipeline---streaming-parallelism">parallel_pipeline - Streaming Parallelism</h3>
<p><strong>Purpose:</strong> Process items through pipeline stages</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">parallel_pipeline(
    max_tokens,
    make_filter&lt;void, Item*&gt;(filter::serial_in_order,
        [&amp;](flow_control&amp; fc) -&gt; Item* {
            // Stage 1: Generate items
            return next_item();
        })
    &amp;
    make_filter&lt;Item*, Item*&gt;(filter::parallel,
        [](Item* item) -&gt; Item* {
            // Stage 2: Process items
            process(item);
            return item;
        })
    &amp;
    make_filter&lt;Item*, void&gt;(filter::serial_in_order,
        [&amp;](Item* item) {
            // Stage 3: Output items
            output(item);
        })
);
</code></pre>
<hr />
<h2 id="-concurrent-containers">🧵 Concurrent Containers</h2>
<h3 id="concurrent_vector---dynamic-array">concurrent_vector - Dynamic Array</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Thread-safe push_back</li>
<li>Concurrent element access</li>
<li><strong>Never invalidates iterators</strong> (unlike std::vector)</li>
<li>Uses segmented storage</li>
</ul>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">concurrent_vector&lt;int&gt; vec;

// Multiple threads can push_back concurrently
parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i)
            vec.push_back(i);  // Thread-safe!
    });
</code></pre>
<p><strong>Key Methods:</strong></p>
<pre><code class="language-cpp">vec.push_back(value);       // Thread-safe append
vec.grow_by(n);             // Atomically add n elements
vec.grow_to_at_least(size); // Ensure minimum size
vec[i];                     // Concurrent access
</code></pre>
<h3 id="concurrent_queue---lock-free-queue">concurrent_queue - Lock-Free Queue</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Lock-free FIFO queue</li>
<li>Multiple producers, multiple consumers</li>
<li>Unbounded capacity</li>
<li>Linearizable</li>
</ul>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">concurrent_queue&lt;Task&gt; queue;

// Producer threads
parallel_for(blocked_range&lt;int&gt;(0, NUM_PRODUCERS),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i)
            queue.push(Task(i));
    });

// Consumer threads
parallel_for(blocked_range&lt;int&gt;(0, NUM_CONSUMERS),
    [&amp;](blocked_range&lt;int&gt; r) {
        Task task;
        while(queue.try_pop(task))
            process(task);
    });
</code></pre>
<p><strong>Key Methods:</strong></p>
<pre><code class="language-cpp">queue.push(item);           // Add item
bool queue.try_pop(item);   // Remove item (non-blocking)
bool queue.empty();         // Check if empty
</code></pre>
<h3 id="concurrent_hash_map---thread-safe-hash-table">concurrent_hash_map - Thread-Safe Hash Table</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Fine-grained locking</li>
<li>Concurrent lookups, insertions, deletions</li>
<li>No iterator invalidation</li>
<li>Accessor pattern for safe access</li>
</ul>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">concurrent_hash_map&lt;string, int&gt; map;

// Insert
map.insert(make_pair(&quot;key&quot;, 42));

// Lookup with accessor
concurrent_hash_map&lt;string, int&gt;::accessor a;
if(map.find(a, &quot;key&quot;)) {
    cout &lt;&lt; &quot;Value: &quot; &lt;&lt; a-&gt;second &lt;&lt; endl;
    a-&gt;second = 100;  // Modify while locked
}  // Automatically releases lock
</code></pre>
<h3 id="concurrent_unordered_map---modern-hash-map">concurrent_unordered_map - Modern Hash Map</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Similar to std::unordered_map interface</li>
<li>Concurrent operations</li>
<li>Better performance than concurrent_hash_map</li>
<li>Preferred for new code</li>
</ul>
<h3 id="concurrent_bounded_queue---bounded-queue">concurrent_bounded_queue - Bounded Queue</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Fixed capacity</li>
<li>Blocking operations</li>
<li>FIFO ordering</li>
<li>Producer-consumer pattern</li>
</ul>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">concurrent_bounded_queue&lt;Task&gt; queue;
queue.set_capacity(1000);

// Producer (blocks if full)
queue.push(task);

// Consumer (blocks if empty)
Task t;
queue.pop(t);
</code></pre>
<h3 id="concurrent_priority_queue---thread-safe-priority-queue">concurrent_priority_queue - Thread-Safe Priority Queue</h3>
<p><strong>Features:</strong></p>
<ul>
<li>Concurrent push/pop</li>
<li>Priority ordering</li>
<li>No iterator support</li>
</ul>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">concurrent_priority_queue&lt;int&gt; pq;
pq.push(5);
pq.push(1);
pq.push(10);

int val;
if(pq.try_pop(val))
    cout &lt;&lt; val &lt;&lt; endl;  // Prints 10 (highest)
</code></pre>

<h2 id="-synchronization-primitives">🔒 Synchronization Primitives</h2>
<h3 id="mutexes">Mutexes</h3>
<table>
<thead>
<tr>
<th>Mutex Type</th>
<th>Use When</th>
<th>Characteristics</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>mutex</code></td>
<td>Default choice</td>
<td>Fair, scalable</td>
</tr>
<tr>
<td><code>spin_mutex</code></td>
<td>Very short critical sections</td>
<td>Busy-wait, low overhead</td>
</tr>
<tr>
<td><code>queuing_mutex</code></td>
<td>Need FIFO fairness</td>
<td>Guaranteed ordering</td>
</tr>
<tr>
<td><code>spin_rw_mutex</code></td>
<td>Multiple readers</td>
<td>Read/write lock, spinlock</td>
</tr>
<tr>
<td><code>queuing_rw_mutex</code></td>
<td>Multiple readers, fair</td>
<td>Read/write, FIFO</td>
</tr>
</tbody>
</table>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">tbb::mutex mtx;
int shared_counter = 0;

parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i) {
            tbb::mutex::scoped_lock lock(mtx);
            shared_counter++;  // Protected
        }
    });
</code></pre>
<h3 id="atomic-operations">Atomic Operations</h3>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">tbb::atomic&lt;int&gt; counter = 0;

parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](blocked_range&lt;int&gt; r) {
        for(int i = r.begin(); i != r.end(); ++i)
            counter++;  // Lock-free atomic increment
    });
</code></pre>
<h3 id="reader-writer-lock">Reader-Writer Lock</h3>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">tbb::spin_rw_mutex rw_mutex;
int shared_data = 0;

// Readers
tbb::spin_rw_mutex::scoped_lock read_lock(rw_mutex, false);  // read mode
int val = shared_data;

// Writer
tbb::spin_rw_mutex::scoped_lock write_lock(rw_mutex, true);  // write mode
shared_data = 42;
</code></pre>

<h2 id="-memory-management">💾 Memory Management</h2>
<h3 id="scalable_allocator---tbb-memory-allocator">scalable_allocator - TBB Memory Allocator</h3>
<p><strong>Purpose:</strong> Replace malloc/new for better multithreaded performance</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">// Use with STL containers
vector&lt;int, tbb::scalable_allocator&lt;int&gt;&gt; vec;

// Or allocate directly
int* ptr = tbb::scalable_allocator&lt;int&gt;().allocate(1000);
// ... use ptr ...
tbb::scalable_allocator&lt;int&gt;().deallocate(ptr, 1000);
</code></pre>
<p><strong>Benefits:</strong></p>
<ul>
<li>Eliminates malloc contention</li>
<li>Better scalability with many threads</li>
<li>Compatible with STL</li>
</ul>
<h3 id="cache_aligned_allocator">cache_aligned_allocator</h3>
<p><strong>Purpose:</strong> Align data to cache lines (avoid false sharing)</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">// Each element on separate cache line
vector&lt;int, tbb::cache_aligned_allocator&lt;int&gt;&gt; data;
</code></pre>
<h3 id="enumerable_thread_specific---thread-local-storage">enumerable_thread_specific - Thread-Local Storage</h3>
<p><strong>Purpose:</strong> Each thread gets its own copy of data</p>
<p><strong>Example:</strong></p>
<pre><code class="language-cpp">enumerable_thread_specific&lt;int&gt; thread_local_sum(0);

parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](blocked_range&lt;int&gt; r) {
        int&amp; local_sum = thread_local_sum.local();
        for(int i = r.begin(); i != r.end(); ++i)
            local_sum += data[i];
    });

// Combine all thread-local values
int total = 0;
for(auto&amp; local : thread_local_sum)
    total += local;
</code></pre>

<h2 id="-performance-best-practices">📊 Performance Best Practices</h2>
<h3 id="1-grain-size-tuning">1. Grain Size Tuning</h3>
<pre><code class="language-cpp">// Too small (overhead dominates)
parallel_for(blocked_range&lt;int&gt;(0, N, 1), ...);  // Bad!

// Too large (poor load balancing)
parallel_for(blocked_range&lt;int&gt;(0, N, N), ...);  // Bad!

// Good (10-100μs of work)
parallel_for(blocked_range&lt;int&gt;(0, N, 1000), ...);  // Good!

// Let TBB decide (usually best)
parallel_for(blocked_range&lt;int&gt;(0, N), ...);  // Best!
</code></pre>
<h3 id="2-minimize-synchronization">2. Minimize Synchronization</h3>
<pre><code class="language-cpp">// Bad: Lock in inner loop
parallel_for(..., [&amp;](auto r) {
    for(int i : r) {
        mutex::scoped_lock lock(mtx);  // Contention!
        result += data[i];
    }
});

// Good: Accumulate locally, lock once
parallel_for(..., [&amp;](auto r) {
    int local_sum = 0;
    for(int i : r)
        local_sum += data[i];
    mutex::scoped_lock lock(mtx);
    result += local_sum;  // One lock per range
});

// Best: Use parallel_reduce (no explicit locking)
int result = parallel_reduce(...);
</code></pre>
<h3 id="3-avoid-false-sharing">3. Avoid False Sharing</h3>
<pre><code class="language-cpp">// Bad: Array elements on same cache line
struct alignas(64) Data {  // Force cache-line alignment
    int counter;
    char padding[60];
};

// Or use cache_aligned_allocator
</code></pre>
<h3 id="4-use-concurrent-containers">4. Use Concurrent Containers</h3>
<pre><code class="language-cpp">// Bad: Manual locking
mutex mtx;
vector&lt;int&gt; results;
parallel_for(..., [&amp;](...) {
    mutex::scoped_lock lock(mtx);
    results.push_back(compute());
});

// Good: Concurrent container
concurrent_vector&lt;int&gt; results;
parallel_for(..., [&amp;](...) {
    results.push_back(compute());  // Lock-free!
});
</code></pre>
<hr />
<h2 id="-common-pitfalls">⚠️ Common Pitfalls</h2>
<h3 id="1-data-races">1. Data Races</h3>
<pre><code class="language-cpp">// WRONG: Data race!
int counter = 0;
parallel_for(..., [&amp;](...) {
    counter++;  // Multiple threads, no synchronization
});

// RIGHT: Use atomic
tbb::atomic&lt;int&gt; counter = 0;
parallel_for(..., [&amp;](...) {
    counter++;  // Thread-safe
});
</code></pre>
<h3 id="2-too-fine-grained-parallelism">2. Too Fine-Grained Parallelism</h3>
<pre><code class="language-cpp">// WRONG: Overhead &gt;&gt; work
parallel_for(blocked_range&lt;int&gt;(0, N),
    [&amp;](auto r) {
        for(int i : r)
            data[i] = i;  // Too simple, not worth parallelizing
    });

// RIGHT: Sequential for simple operations
for(int i = 0; i &lt; N; ++i)
    data[i] = i;
</code></pre>
<h3 id="3-nested-locks-deadlock">3. Nested Locks (Deadlock)</h3>
<pre><code class="language-cpp">// WRONG: Can deadlock
parallel_for(..., [&amp;](...) {
    mutex::scoped_lock lock1(mutex1);
    mutex::scoped_lock lock2(mutex2);  // Deadlock risk!
});

// RIGHT: Always lock in same order
parallel_for(..., [&amp;](...) {
    mutex::scoped_lock lock1(mutex1);  // Always mutex1 first
    mutex::scoped_lock lock2(mutex2);  // Then mutex2
});
</code></pre>
<h3 id="4-using-stdcontainers-concurrently">4. Using std::containers Concurrently</h3>
<pre><code class="language-cpp">// WRONG: std::vector not thread-safe
vector&lt;int&gt; vec;
parallel_for(..., [&amp;](...) {
    vec.push_back(42);  // DATA RACE!
});

// RIGHT: Use concurrent_vector
concurrent_vector&lt;int&gt; vec;
parallel_for(..., [&amp;](...) {
    vec.push_back(42);  // Thread-safe
});
</code></pre>

<h2 id="-learning-path">🎓 Learning Path</h2>
<h3 id="beginner-start-here">Beginner (Start Here)</h3>
<ol>
<li>✅ <code>parallel_for</code> - Basic parallel loops</li>

    if (c.toLowerCase() === 'readme') return 'README';

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

/* ───── Wrap tables so they scroll horizontally on narrow screens ───── */
function wrapTables() {
    document.querySelectorAll('.tab-content table').forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
}

function getStoredTheme() {
    try { return localStorage.getItem('doc-theme'); } catch(e) { return null; }
}

const darkMql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
function osTheme() { return (darkMql && darkMql.matches) ? 'dark' : 'light'; }

// Apply a theme. `persist` is true ONLY for an explicit user action; auto/OS
// applications must NOT write to storage, otherwise the very first auto theme
// would look like an explicit choice and we'd stop following the OS.
function setTheme(theme, persist) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = (theme === 'light' ? ICON_SUN : ICON_MOON);
    themeToggleBtn.title = theme === 'light'
        ? 'Switch to dark mode (Ctrl+Shift+L)'
        : 'Switch to light mode (Ctrl+Shift+L)';
    if (persist) {
        try { localStorage.setItem('doc-theme', theme); } catch(e) {}
    }
}

function toggleTheme() {
    const current = document.body.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark', true);
}

(function initTheme() {
    const stored = getStoredTheme();
    if (stored === 'light' || stored === 'dark') {
        setTheme(stored, false);              // explicit user choice wins
    } else {
        setTheme(osTheme(), false);           // otherwise follow the OS (live)
    }
})();

// Live-follow the OS appearance while the reader hasn't picked a theme manually.
if (darkMql) {
    const onOsChange = (e) => {
        const stored = getStoredTheme();
        if (stored !== 'light' && stored !== 'dark') {
            setTheme(e.matches ? 'dark' : 'light', false);
        }
    };
    if (darkMql.addEventListener) darkMql.addEventListener('change', onOsChange);
    else if (darkMql.addListener) darkMql.addListener(onOsChange);  // older Safari
}

themeToggleBtn.addEventListener('click', toggleTheme);

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'L') {
        e.preventDefault();
        toggleTheme();
